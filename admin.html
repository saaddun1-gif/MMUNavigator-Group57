<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMU Navigator - Admin</title>
    
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body onload="initApp()">

    <button class="menu-toggle-btn" onclick="toggleSidebar()">
        <img src="menu.png" class="icon-img">
    </button>

    <div class="sidebar" id="mySidebar">
        <button class="nav-btn" onclick="toggleSidebar()" style="background: #f0f0f0;">
            <img src="menu.png" class="icon-img">
        </button>
        <button class="nav-btn"><img src="chatbox.png" class="icon-img"></button>
        <button class="nav-btn" onclick="openHomeMenu()"><img src="home.png" class="icon-img"></button>
        
        <button id="adminBtn" class="nav-btn" onclick="toggleAdminMode()">
            <img src="1.png" class="icon-img">
        </button>
        
        <div style="margin-top: auto;">
            <button class="nav-btn" style="border-radius: 50%; overflow: hidden;">
                <img src="admin.png" class="profile-img">
            </button>
        </div>
    </div>

    <div class="sub-sidebar" id="homeSidebar">
        <h1 id="subHeaderTitle">Categories</h1> 
        <div id="categoryBody" class="category-body-content"></div>
        <button id="backBtn" class="back-link" onclick="loadMainCategories()" style="display:none;">← Back</button>
    </div>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Search MMU locations...">
    </div>
    
    <div id="map"></div>

    <script>
        let isAdminMode = false;
        let currentView = 'main';
        let currentCategory = '';

        const campusData = {
            'Facility': ['Library', 'Surau', 'Gym', 'Cafe', 'Bank', 'Clinic', 'Lab', 'Store'],
            'Hall': ['Dewan Tun Canselor', 'Exam Hall', 'MPH', 'Grand Hall'],
            'Faculty': ['FCI', 'FOE', 'FCM', 'FAC']
        };

        function initApp() {
            initMap();
            loadMainCategories();
        }

        function toggleSidebar() {
            const sidebar = document.getElementById("mySidebar");
            const subSidebar = document.getElementById("homeSidebar");
            sidebar.classList.toggle("active");
            if (!sidebar.classList.contains("active")) { subSidebar.classList.remove("active"); }
        }

        function openHomeMenu() {
            document.getElementById("mySidebar").classList.add("active");
            document.getElementById("homeSidebar").classList.add("active");
            loadMainCategories();
        }

        function toggleAdminMode() {
            isAdminMode = !isAdminMode;
            document.getElementById('adminBtn').classList.toggle('admin-active');
            refreshUI();
        }

        function refreshUI() {
            if (currentView === 'main') loadMainCategories();
            else showSubCategory(currentCategory);
        }

        function loadMainCategories() {
            currentView = 'main';
            const body = document.getElementById('categoryBody');
            const title = document.getElementById('subHeaderTitle');
            const backBtn = document.getElementById('backBtn');
            title.innerText = isAdminMode ? "Delete" : "Categories";
            backBtn.style.display = 'none';
            body.innerHTML = '';

            ['Facility', 'Faculty', 'Hall'].forEach(cat => {
                body.innerHTML += `<button class="category-btn-wide" onclick="showSubCategory('${cat}')">${cat}</button>`;
            });
        }

        function showSubCategory(category) {
            currentView = 'sub';
            currentCategory = category;
            const body = document.getElementById('categoryBody');
            const title = document.getElementById('subHeaderTitle');
            const backBtn = document.getElementById('backBtn');
            title.innerText = isAdminMode ? "Add/Update" : category;
            backBtn.style.display = 'block';
            body.innerHTML = '';

            // Use Grid for Facility (2 side by side), Use List for others (1 wide button)
            const listContainer = document.createElement('div');
            listContainer.className = (category === 'Facility') ? 'grid-container-2col' : 'wide-list-container';

            campusData[category].forEach((item, index) => {
                const container = document.createElement('div');
                container.className = 'item-container';
                
                // Hall/Faculty get Wide Rectangle, Facilities get Square-ish Grid
                const btnClass = (category === 'Facility') ? 'facility-grid-btn' : 'category-btn-wide';
                container.innerHTML = `<div class="${btnClass}">${item}</div>`;

                if (isAdminMode) {
                    const del = document.createElement('button');
                    del.className = 'delete-badge';
                    del.innerText = 'X';
                    del.onclick = (e) => {
                        e.stopPropagation();
                        campusData[category].splice(index, 1);
                        showSubCategory(category);
                    };
                    container.appendChild(del);
                }
                listContainer.appendChild(container);
            });

            body.appendChild(listContainer);

            if (isAdminMode) {
                const addBtn = document.createElement('button');
                addBtn.className = 'add-item-wide-btn';
                addBtn.innerText = '+';
                addBtn.onclick = () => {
                    const val = prompt("Enter Name:");
                    if (val) { campusData[category].push(val); showSubCategory(category); }
                };
                body.appendChild(addBtn);
            }
        }

        function initMap() {
            var map = L.map('map', { zoomControl: false }).setView([2.9276, 101.6418], 18);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }
    </script>
</body>
</html>
