<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMU Navigator - Admin Mode</title>
    
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body onload="initApp()">

    <button class="menu-toggle-btn" onclick="toggleSidebar()">
        <img src="menu.png" class="icon-img">
    </button>

    <div class="sidebar" id="mySidebar">
        <button class="nav-btn" onclick="toggleSidebar()" style="background: #f0f0f0;">
            <img src="menu.png" class="icon-img">
        </button>
        <button class="nav-btn" onclick="openChatMenu()"><img src="chatbox.png" class="icon-img"></button>
        <button class="nav-btn" onclick="openHomeMenu()"><img src="home.png" class="icon-img"></button>
        
        <button class="nav-btn" onclick="openSettingsMenu()">
            <img src="setting.png" class="icon-img">
        </button>
        
        <div style="margin-top: auto;">
            <button class="nav-btn" style="border-radius: 50%; overflow: hidden;">
                <img src="admin.png" class="profile-img">
            </button>
        </div>
    </div>

    <div class="sub-sidebar" id="homeSidebar">
        <h1 id="subHeaderTitle">Categories</h1> 
        <div id="categoryBody" class="category-body-content"></div>
        <button id="backBtn" class="back-link" onclick="loadMainCategories()" style="display:none;">← Back</button>
    </div>

    <div class="sub-sidebar" id="chatSidebar">
        <h1>AI Chat box</h1>
        <div class="chat-messages-container" id="chatMessages">
            <div class="bot-msg">Hello! How can I help you?</div>
            <div id="templateContainer" class="template-grid"></div>
        </div>
        <div class="chat-input-wrapper">
            <input type="text" class="chat-input-field" placeholder="Ask me anything...">
        </div>
    </div>

    <div class="sub-sidebar" id="settingsSidebar">
        <h1>Chat Settings</h1>
        <p style="margin-bottom: 10px; font-weight: bold;">Add Template Question:</p>
        <input type="text" id="newTemplateInput" class="admin-input" placeholder="Enter question here...">
        <button class="add-item-wide-btn" onclick="addTemplate()" style="height: 50px; font-size: 18px; margin-top: 10px;">Save Question</button>
        
        <hr style="width: 100%; margin: 20px 0; border: 1px solid #ddd;">
        
        <p style="margin-bottom: 10px; font-weight: bold;">Existing Templates:</p>
        <div id="templateManagerList" style="width: 100%;"></div>
    </div>

    <div id="map"></div>

    <script>
        // Data Arrays
        const campusData = {
            'Facility': ['Library', 'Surau', 'Gym', 'Cafe'],
            'Hall': ['Dewan Tun Canselor', 'Exam Hall'],
            'Faculty': ['FCI', 'FOE', 'FCM', 'FAC']
        };

        // Templates stored here
        let chatTemplates = ["Where is the Library?", "How to go to FCI?"];

        function initApp() {
            initMap();
            loadMainCategories();
            renderTemplates();
        }

        /* --- SIDEBAR CONTROLS --- */
        function closeAllSubSidebars() {
            document.getElementById("homeSidebar").classList.remove("active");
            document.getElementById("chatSidebar").classList.remove("active");
            document.getElementById("settingsSidebar").classList.remove("active");
        }

        function toggleSidebar() {
            const sidebar = document.getElementById("mySidebar");
            sidebar.classList.toggle("active");
            if (!sidebar.classList.contains("active")) closeAllSubSidebars();
        }

        function openHomeMenu() {
            closeAllSubSidebars();
            document.getElementById("mySidebar").classList.add("active");
            document.getElementById("homeSidebar").classList.add("active");
            loadMainCategories();
        }

        function openChatMenu() {
            closeAllSubSidebars();
            document.getElementById("mySidebar").classList.add("active");
            document.getElementById("chatSidebar").classList.add("active");
            renderTemplates(); // Refresh view
        }

        function openSettingsMenu() {
            closeAllSubSidebars();
            document.getElementById("mySidebar").classList.add("active");
            document.getElementById("settingsSidebar").classList.add("active");
            renderTemplateManager();
        }

        /* --- TEMPLATE LOGIC --- */
        function addTemplate() {
            const input = document.getElementById('newTemplateInput');
            if (input.value.trim() !== "") {
                chatTemplates.push(input.value.trim());
                input.value = "";
                renderTemplateManager();
            }
        }

        function deleteTemplate(index) {
            chatTemplates.splice(index, 1);
            renderTemplateManager();
        }

        // Displays buttons in the Chat Preview
        function renderTemplates() {
            const container = document.getElementById('templateContainer');
            container.innerHTML = '';
            chatTemplates.forEach(text => {
                container.innerHTML += `<button class="chat-template-btn">${text}</button>`;
            });
        }

        // Displays list in the Settings Sidebar
        function renderTemplateManager() {
            const list = document.getElementById('templateManagerList');
            list.innerHTML = '';
            chatTemplates.forEach((text, index) => {
                list.innerHTML += `
                    <div class="item-container" style="margin-bottom: 10px;">
                        <div class="admin-template-item">${text}</div>
                        <button class="delete-badge" onclick="deleteTemplate(${index})">X</button>
                    </div>
                `;
            });
        }

        /* --- BASIC UI --- */
        function loadMainCategories() {
            const body = document.getElementById('categoryBody');
            body.innerHTML = '';
            ['Facility', 'Faculty', 'Hall'].forEach(cat => {
                body.innerHTML += `<button class="category-btn-wide" onclick="showSubCategory('${cat}')">${cat}</button>`;
            });
        }

        function showSubCategory(category) {
            const body = document.getElementById('categoryBody');
            document.getElementById('backBtn').style.display = 'block';
            body.innerHTML = `<div class="grid-container-2col"></div>`;
            const grid = body.querySelector('.grid-container-2col');
            campusData[category].forEach(item => {
                grid.innerHTML += `<div class="facility-grid-btn">${item}</div>`;
            });
        }

        function initMap() {
            var map = L.map('map', { zoomControl: false }).setView([2.9276, 101.6418], 18);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }
    </script>
</body>
</html>
