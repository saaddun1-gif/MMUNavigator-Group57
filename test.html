<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Navigator - Smart Sidebar</title>
    
    <link rel="stylesheet" href="test.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <button class="menu-toggle-btn" onclick="toggleSidebar()">
        <img src="menu.png" class="icon-img">
    </button>

    <div class="top-right-container">
        <a href="guide.html" class="control-btn">
            <img src="question.png" class="icon-img">
        </a>
        <button id="gpsBtn" class="control-btn" onclick="locateUser()">
            <img src="gps.png" class="icon-img">
        </button>
    </div>

    <div class="sidebar" id="mySidebar">
        <button class="nav-btn" onclick="toggleSidebar()" style="background: #f0f0f0;">
            <img src="menu.png" class="icon-img">
        </button>

        <button class="nav-btn"><img src="chatbox.png" class="icon-img"></button>
        
        <button class="nav-btn" onclick="toggleHomeMenu()">
            <img src="home.png" class="icon-img">
        </button>

        <div style="margin-top: auto;">
            <button class="nav-btn" style="border-radius: 50%;">
                <img src="https://via.placeholder.com/100?text=Admin" style="width:100%; height:100%; border-radius:50%;">
            </button>
        </div>
    </div>

    <div class="sub-sidebar" id="homeSidebar">
        <h1 id="subHeaderTitle" style="margin-bottom: 20px;">Categories</h1> 
        
        <div id="mainCategoryButtons">
            <button class="category-btn" onclick="showSubCategory('Facility')">Facility</button>
            <button class="category-btn" onclick="showSubCategory('Faculty')">Faculty</button>
            <button class="category-btn" onclick="showSubCategory('Hall')">Hall</button>
        </div>

        <div id="subCategoryGrid" class="category-grid-container" style="display: none;">
            </div>

        <button id="backBtn" class="back-link" onclick="goBackToCategories()" style="display: none;">
            ← Back to Categories
        </button>
    </div>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Search MMU locations...">
    </div>
    
    <div id="map"></div>
    
    <div class="distance-tool">
        <strong>Distance Tool</strong><br>
        <button onclick="calculateDist()" style="margin-top:5px; cursor:pointer;">Calculate</button>
        <p id="dist-result" style="margin-top:5px; font-weight:bold;">--- meters</p>
    </div>

    <script>
        // Data for MMU locations
        const campusData = {
            'Facility': ['Library', 'Surau', 'Gym', 'Cafe', 'Bank', 'Clinic', 'Lab', 'Store'],
            'Faculty': ['FCI', 'FOE', 'FCM', 'FAC'],
            'Hall': ['Dewan Tun Canselor', 'Exam Hall', 'MPH']
        };

        function toggleSidebar() {
            var mainSidebar = document.getElementById("mySidebar");
            var subSidebar = document.getElementById("homeSidebar");
            mainSidebar.classList.toggle("active");
            if (!mainSidebar.classList.contains("active")) {
                subSidebar.classList.remove("active");
            }
        }

        function toggleHomeMenu() {
            var homeMenu = document.getElementById("homeSidebar");
            homeMenu.classList.toggle("active");
        }

        // NEW: Function to show the squares
        function showSubCategory(category) {
            document.getElementById('mainCategoryButtons').style.display = 'none';
            document.getElementById('subCategoryGrid').style.display = 'grid';
            document.getElementById('backBtn').style.display = 'block';
            document.getElementById('subHeaderTitle').innerText = category;

            const grid = document.getElementById('subCategoryGrid');
            grid.innerHTML = ''; // Clear old squares

            campusData[category].forEach(item => {
                const square = document.createElement('div');
                square.className = 'sub-item-square';
                square.innerText = item;
                grid.appendChild(square);
            });
        }

        function goBackToCategories() {
            document.getElementById('mainCategoryButtons').style.display = 'block';
            document.getElementById('subCategoryGrid').style.display = 'none';
            document.getElementById('backBtn').style.display = 'none';
            document.getElementById('subHeaderTitle').innerText = "Categories";
        }

        var map = L.map('map', { zoomControl: false }).setView([2.9276, 101.6418], 18);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 20, attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // WAZE GPS LOGIC
        var userMarker, isFollowing = false;
        var navIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/506/506185.png', 
            iconSize: [40, 40], iconAnchor: [20, 20]
        });

        function locateUser() {
            isFollowing = true;
            document.getElementById('gpsBtn').classList.add('active-gps');
            map.locate({setView: true, maxZoom: 18, watch: true, enableHighAccuracy: true});
        }

        map.on('locationfound', function(e) {
            if (!userMarker) {
                userMarker = L.marker(e.latlng, {icon: navIcon}).addTo(map);
            } else {
                userMarker.setLatLng(e.latlng);
            }
            if (isFollowing) map.panTo(e.latlng, { animate: true, duration: 1.0 });
        });

        map.on('dragstart', () => {
            isFollowing = false;
            document.getElementById('gpsBtn').classList.remove('active-gps');
        });

        function calculateDist() {
            let num = Math.floor(Math.random() * 500) + 50; 
            document.getElementById('dist-result').innerText = num + " meters";
        }
    </script>
</body>
</html>
