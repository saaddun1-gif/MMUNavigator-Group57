<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMU Navigator - Live View</title>
    
    <link rel="stylesheet" href="test.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <button class="menu-toggle-btn" onclick="toggleSidebar()">
        <img src="menu.png" class="icon-img">
    </button>

    <div class="top-right-container">
        <a href="guide.html" class="control-btn">
            <img src="question.png" class="icon-img">
        </a>
        <button id="gpsBtn" class="control-btn" onclick="locateUser()">
            <img src="gps.png" class="icon-img">
        </button>
    </div>

    <div class="sidebar" id="mySidebar">
        <button class="nav-btn" onclick="toggleSidebar()" style="background: #f0f0f0;">
            <img src="menu.png" class="icon-img">
        </button>
        <button class="nav-btn"><img src="chatbox.png" class="icon-img"></button>
        <button class="nav-btn" onclick="toggleHomeMenu()"><img src="home.png" class="icon-img"></button>
        <div style="margin-top: auto;">
            <button class="nav-btn" style="border-radius: 50%;">
                <img src="https://via.placeholder.com/100?text=User" style="width:100%; height:100%; border-radius:50%;">
            </button>
        </div>
    </div>

    <div class="sub-sidebar" id="homeSidebar">
        <h1 style="margin-bottom: 20px;">Categories</h1> 
        <button class="category-btn">Facility</button>
        <button class="category-btn">Faculty</button>
        <button class="category-btn">Hall</button>
    </div>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Search MMU locations...">
    </div>
    
    <div id="map"></div>
    
    <div class="distance-tool">
        <strong>Distance Tool</strong><br>
        <button onclick="calculateDist()" style="margin-top:5px; cursor:pointer;">Calculate</button>
        <p id="dist-result" style="margin-top:5px; font-weight:bold;">--- meters</p>
    </div>

    <script>
        /* --- SIDEBAR LOGIC --- */
        function toggleSidebar() {
            var mainSidebar = document.getElementById("mySidebar");
            var subSidebar = document.getElementById("homeSidebar");
            mainSidebar.classList.toggle("active");
            if (!mainSidebar.classList.contains("active")) {
                subSidebar.classList.remove("active");
            }
        }

        function toggleHomeMenu() {
            document.getElementById("homeSidebar").classList.toggle("active");
        }

        /* --- MAP SETUP --- */
        var map = L.map('map', { zoomControl: false }).setView([2.9276, 101.6418], 18);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 20,
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        /* --- WAZE-STYLE GPS LOGIC --- */
        var userMarker;
        var isFollowing = false; // Starts off, turns on when button clicked

        // Navigation Arrow Icon
        var navIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/506/506185.png', 
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        });

        function locateUser() {
            isFollowing = true; 
            document.getElementById('gpsBtn').classList.add('active-gps');
            
            map.locate({
                setView: true, 
                maxZoom: 18, 
                watch: true, 
                enableHighAccuracy: true 
            });
        }

        map.on('locationfound', function(e) {
            if (!userMarker) {
                userMarker = L.marker(e.latlng, {icon: navIcon}).addTo(map);
            } else {
                userMarker.setLatLng(e.latlng);
            }

            // Smoothly move the camera to follow the user
            if (isFollowing) {
                map.panTo(e.latlng, { animate: true, duration: 1.0 });
            }
        });

        // If user manually drags the map, stop the auto-following
        map.on('dragstart', function() {
            isFollowing = false;
            document.getElementById('gpsBtn').classList.remove('active-gps');
        });

        /* --- DISTANCE LOGIC --- */
        function calculateDist() {
            let num = Math.floor(Math.random() * 500) + 50; 
            document.getElementById('dist-result').innerText = num + " meters";
        }
    </script>
</body>
</html>
