<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMU Navigator - Cyberjaya</title>
    
    <link rel="stylesheet" href="test.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body onload="initApp()">

    <button class="menu-toggle-btn" onclick="toggleSidebar()">
        <img src="menu.png" class="icon-img">
    </button>

    <div class="sidebar" id="mySidebar">
        <button class="nav-btn" onclick="toggleSidebar()" style="background: #f0f0f0;">
            <img src="menu.png" class="icon-img">
        </button>
        <button class="nav-btn" onclick="openChatMenu()">
            <img src="chatbox.png" class="icon-img">
        </button>
        <button class="nav-btn" onclick="openHomeMenu()">
            <img src="home.png" class="icon-img">
        </button>
        
        <div style="margin-top: auto;">
            <button class="nav-btn" style="border-radius: 50%; overflow: hidden;">
                <img src="admin.png" class="profile-img">
            </button>
        </div>
    </div>

    <div class="sub-sidebar" id="homeSidebar">
        <h1 id="subHeaderTitle">Categories</h1> 
        <div id="categoryBody" class="category-body-content"></div>
        <button id="backBtn" class="back-link" onclick="loadMainCategories()" style="display:none;">← Back</button>
    </div>

    <div class="sub-sidebar" id="chatSidebar">
        <h1>AI Chat box</h1>
        <div class="chat-messages-container" id="chatMessages">
            <div class="bot-msg">Hello! I am your MMU Guide. How can I help you today?</div>
        </div>
        <div class="chat-input-wrapper">
            <input type="text" class="chat-input-field" placeholder="Ask me anything...">
        </div>
    </div>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Search MMU locations...">
    </div>
    
    <div id="map"></div>

    <script>
        // Campus Data
        const campusData = {
            'Facility': ['Library', 'Surau', 'Gym', 'Cafe', 'Bank', 'Clinic', 'Lab', 'Store'],
            'Hall': ['Dewan Tun Canselor', 'Exam Hall', 'MPH', 'Grand Hall'],
            'Faculty': ['FCI', 'FOE', 'FCM', 'FAC']
        };

        function initApp() {
            initMap();
            loadMainCategories();
        }

        // --- Sidebar Controls ---
        function toggleSidebar() {
            const sidebar = document.getElementById("mySidebar");
            const homeSidebar = document.getElementById("homeSidebar");
            const chatSidebar = document.getElementById("chatSidebar");
            
            sidebar.classList.toggle("active");
            
            // If main bar closes, hide everything else
            if (!sidebar.classList.contains("active")) {
                homeSidebar.classList.remove("active");
                chatSidebar.classList.remove("active");
            }
        }

        function openHomeMenu() {
            document.getElementById("chatSidebar").classList.remove("active");
            document.getElementById("mySidebar").classList.add("active");
            document.getElementById("homeSidebar").classList.add("active");
            loadMainCategories();
        }

        function openChatMenu() {
            document.getElementById("homeSidebar").classList.remove("active");
            document.getElementById("mySidebar").classList.add("active");
            document.getElementById("chatSidebar").classList.add("active");
        }

        // --- Content Loading ---
        function loadMainCategories() {
            const body = document.getElementById('categoryBody');
            const title = document.getElementById('subHeaderTitle');
            const backBtn = document.getElementById('backBtn');
            
            title.innerText = "Categories";
            backBtn.style.display = 'none';
            body.innerHTML = '';

            ['Facility', 'Faculty', 'Hall'].forEach(cat => {
                body.innerHTML += `<button class="category-btn-wide" onclick="showSubCategory('${cat}')">${cat}</button>`;
            });
        }

        function showSubCategory(category) {
            const body = document.getElementById('categoryBody');
            const title = document.getElementById('subHeaderTitle');
            const backBtn = document.getElementById('backBtn');
            
            title.innerText = category;
            backBtn.style.display = 'block';
            body.innerHTML = '';

            const listContainer = document.createElement('div');
            // Facilities = 2 columns. Others = 1 wide column.
            listContainer.className = (category === 'Facility') ? 'grid-container-2col' : 'wide-list-container';

            campusData[category].forEach((item) => {
                const btnClass = (category === 'Facility') ? 'facility-grid-btn' : 'category-btn-wide';
                listContainer.innerHTML += `<div class="${btnClass}">${item}</div>`;
            });

            body.appendChild(listContainer);
        }

        function initMap() {
            var map = L.map('map', { zoomControl: false }).setView([2.9276, 101.6418], 18);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }
    </script>
</body>
</html>
