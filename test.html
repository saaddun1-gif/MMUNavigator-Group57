<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMU Navigator</title>
    
    <link rel="stylesheet" href="test.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body onload="initApp()">

    <!-- Menu Toggle Button -->
    <button class="menu-toggle-btn" onclick="toggleSidebar()">
        <img src="menu.png" class="icon-img" alt="Menu">
    </button>

    <!-- Top Right Controls -->
    <div class="top-right-container">
        <a href="guide.html" class="control-btn">
            <img src="question.png" class="icon-img" alt="Help">
        </a>
        <button id="gpsBtn" class="control-btn" onclick="locateUser()">
            <img src="gps.png" class="icon-img" alt="GPS">
        </button>
    </div>

    <!-- Main Sidebar -->
    <div class="sidebar" id="mySidebar">
        <button class="nav-btn" onclick="toggleSidebar()" style="background: #f0f0f0;">
            <img src="menu.png" class="icon-img" alt="Menu">
        </button>
        <button class="nav-btn" onclick="openChatMenu()">
            <img src="chatbox.png" class="icon-img" alt="Chat">
        </button>
        <button class="nav-btn" onclick="openHomeMenu()">
            <img src="home.png" class="icon-img" alt="Home">
        </button>
        
        <div style="margin-top: auto;">
            <button class="nav-btn" style="border-radius: 50%; overflow: hidden;">
                <img src="admin.png" class="profile-img" alt="Profile">
            </button>
        </div>
    </div>

    <!-- Home Sidebar (Categories) -->
    <div class="sub-sidebar" id="homeSidebar">
        <!-- This title changes based on where we are -->
        <div id="topHeaderBox" class="header-box" style="display: none;"></div>
        <h1 id="subHeaderTitle">Categories</h1> 
        
        <div id="categoryBody" class="category-body-content" style="width: 100%;"></div>
        <button id="backBtn" class="back-link" onclick="loadMainCategories()" style="display:none;">← Back</button>
    </div>

    <!-- Chat Sidebar -->
    <div class="sub-sidebar" id="chatSidebar">
        <h1>AI Chat box</h1>
        <div class="chat-messages-container" id="chatMessages">
            <div class="bot-msg">Hello! How can I help you navigate MMU today?</div>
            <div class="template-preview-area">
                <button class="chat-pill" onclick="fillChat('Where is the Library?')">Where is the Library?</button>
                <button class="chat-pill" onclick="fillChat('How to go to FCI?')">How to go to FCI?</button>
            </div>
        </div>
        <div class="chat-input-wrapper">
            <input type="text" id="userInput" class="chat-input-field" placeholder="Ask me anything...">
        </div>
    </div>

    <!-- Search Box -->
    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Search MMU locations...">
    </div>
    
    <div id="map"></div>

    <script>
        // Data is updated. Faculty now has levels and classes inside it.
        const campusData = {
            'Facility': ['Library', 'Surau', 'Gym', 'Cafe', 'Bank', 'Clinic', 'Lab', 'Store'],
            'Hall': ['Dewan Tun Canselor', 'Exam Hall', 'MPH', 'Grand Hall'],
            'Faculty': {
                'FCI': {
                    'Level 1': ['CR 101', 'CR 102', 'Lab 1', 'Lab 2'],
                    'Level 2': ['CR 201', 'CR 202', 'Meeting Room'],
                    'Level 3': ['CR 301', 'Staff Room'],
                    'Level 4': ['CR 401', 'CR 402']
                },
                'FAIE': {
                    'Level 1': ['Lab A', 'Lab B'],
                    'Level 2': ['CR 1', 'CR 2']
                },
                'FAC': {
                    'Level 1': ['CR 101', 'CR 102', 'Lab 1', 'Lab 2'],
                    'Level 2': ['CR 201', 'CR 202', 'Meeting Room'],
                    'Level 3': ['CR 301', 'Staff Room'],
                    'Level 4': ['CR 401', 'CR 402']
                },
                'FOM': {
                    'Level 1': ['CR 101', 'CR 102', 'Lab 1', 'Lab 2'],
                    'Level 2': ['CR 201', 'CR 202', 'Meeting Room'],
                    'Level 3': ['CR 301', 'Staff Room'],
                    'Level 4': ['CR 401', 'CR 402']
                }
            }
        };

        function initApp() {
            initMap();
            loadMainCategories();
        }

        /* --- SIDEBAR LOGIC --- */
        function toggleSidebar() {
            const sidebar = document.getElementById("mySidebar");
            sidebar.classList.toggle("active");
            if (!sidebar.classList.contains("active")) {
                closeAllSubSidebars();
            }
        }

        function closeAllSubSidebars() {
            document.querySelectorAll('.sub-sidebar').forEach(s => s.classList.remove('active'));
        }

        function openHomeMenu() {
            closeAllSubSidebars();
            document.getElementById("mySidebar").classList.add("active");
            document.getElementById("homeSidebar").classList.add("active");
            loadMainCategories();
        }

        function openChatMenu() {
            closeAllSubSidebars();
            document.getElementById("mySidebar").classList.add("active");
            document.getElementById("chatSidebar").classList.add("active");
        }

        /* --- HOME CATEGORY LOGIC --- */

        // Main Menu (Facility, Faculty, Hall)
        function loadMainCategories() {
            const body = document.getElementById('categoryBody');
            document.getElementById('topHeaderBox').style.display = 'none'; // Hide the big chosen box
            document.getElementById('subHeaderTitle').innerText = "Categories";
            document.getElementById('subHeaderTitle').style.display = 'block';
            document.getElementById('backBtn').style.display = 'none';
            body.innerHTML = '';

            ['Facility', 'Faculty', 'Hall'].forEach(cat => {
                body.innerHTML += `<button class="category-btn-wide" onclick="showSubCategory('${cat}')">${cat}</button>`;
            });
        }

        // Sub Menu (Shows list of items or list of faculties)
        function showSubCategory(category) {
            const body = document.getElementById('categoryBody');
            
            // Set up headers
            document.getElementById('topHeaderBox').innerText = category;
            document.getElementById('topHeaderBox').style.display = 'block'; // Show big box like wireframe
            document.getElementById('subHeaderTitle').style.display = 'none'; // Hide normal title
            
            const backBtn = document.getElementById('backBtn');
            backBtn.style.display = 'block';
            backBtn.onclick = loadMainCategories;
            
            body.innerHTML = '';

            if (category === 'Faculty') {
                // If it's Faculty, show the list of faculties (FCI, FOE)
                const faculties = Object.keys(campusData['Faculty']);
                faculties.forEach(fac => {
                    body.innerHTML += `<button class="category-btn-wide" onclick="showFacultyLevels('${fac}')">${fac}</button>`;
                });
            } else {
                // If it's Facility or Hall, show grid or list like before
                const listContainer = document.createElement('div');
                listContainer.className = (category === 'Facility') ? 'grid-container-2col' : 'wide-list-container';

                campusData[category].forEach((item) => {
                    const btnClass = (category === 'Facility') ? 'facility-grid-btn' : 'category-btn-wide';
                    listContainer.innerHTML += `<div class="${btnClass}">${item}</div>`;
                });
                body.appendChild(listContainer);
            }
        }

        // Picture 1: Shows levels inside a chosen faculty
        function showFacultyLevels(facultyName) {
            const body = document.getElementById('categoryBody');
            
            // Top box shows chosen faculty
            document.getElementById('topHeaderBox').innerText = facultyName;
            
            const backBtn = document.getElementById('backBtn');
            backBtn.onclick = () => showSubCategory('Faculty'); // Go back to faculty list
            
            body.innerHTML = '';

            const levels = Object.keys(campusData['Faculty'][facultyName]);
            levels.forEach(level => {
                body.innerHTML += `<button class="category-btn-wide" onclick="showClasses('${facultyName}', '${level}')">${level}</button>`;
            });
        }

        // Picture 2: Shows classes inside a chosen level
        function showClasses(facultyName, levelName) {
            const body = document.getElementById('categoryBody');
            
            // Show both Faculty and Level in the top box
            document.getElementById('topHeaderBox').innerHTML = `${facultyName}<br><br>${levelName}`;
            
            const backBtn = document.getElementById('backBtn');
            backBtn.onclick = () => showFacultyLevels(facultyName); // Go back to level list
            
            body.innerHTML = '<p style="text-align:center; margin-bottom:10px;">List of classes</p>';

            const listContainer = document.createElement('div');
            listContainer.className = 'grid-container-2col'; // 2 columns for classes like Picture 2

            const classes = campusData['Faculty'][facultyName][levelName];
            classes.forEach((className) => {
                listContainer.innerHTML += `<div class="class-grid-btn">${className}</div>`;
            });

            body.appendChild(listContainer);
        }

        /* --- MAP & CHAT LOGIC --- */
        function fillChat(text) { document.getElementById('userInput').value = text; }
        function initMap() {
            var map = L.map('map', { zoomControl: false }).setView([2.9276, 101.6418], 18);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }
        function locateUser() { alert("Finding your location..."); }
    </script>
</body>
</html>
