<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMU Navigator - Final Version</title>
    
    <link rel="stylesheet" href="test.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <button class="menu-toggle-btn" onclick="toggleSidebar()">
        <img src="menu.png" class="icon-img">
    </button>

    <div class="top-right-container">
        <a href="guide.html" class="control-btn">
            <img src="question.png" class="icon-img">
        </a>
        <button id="gpsBtn" class="control-btn" onclick="locateUser()">
            <img src="gps.png" class="icon-img">
        </button>
    </div>

    <div class="sidebar" id="mySidebar">
        <button class="nav-btn" onclick="toggleSidebar()" style="background: #f0f0f0;">
            <img src="menu.png" class="icon-img">
        </button>
        <button class="nav-btn"><img src="chatbox.png" class="icon-img"></button>
        <button class="nav-btn" onclick="toggleHomeMenu()"><img src="home.png" class="icon-img"></button>
        
        <div style="margin-top: auto;">
            <button class="nav-btn" style="border-radius: 50%;">
                <img src="admin.png" class="profile-img">
            </button>
        </div>
    </div>

    <div class="sub-sidebar" id="homeSidebar">
        <h1 id="subHeaderTitle">Categories</h1> 
        
        <div id="categoryBody" class="category-body-content">
            <button class="category-btn" onclick="showSubCategory('Facility')">Facility</button>
            <button class="category-btn" onclick="showSubCategory('Faculty')">Faculty</button>
            <button class="category-btn" onclick="showSubCategory('Hall')">Hall</button>
        </div>

        <button id="backBtn" class="back-link" onclick="loadMainCategories()" style="display:none;">
            ← Back
        </button>
    </div>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Search MMU locations...">
    </div>
    
    <div id="map"></div>

    <script>
        // --- DATA (Stored as JSON-style lists) ---
        const campusData = {
            'Facility': ['Library', 'Surau', 'Gym', 'Cafe', 'Bank', 'Clinic', 'Lab', 'Store'],
            'Hall': ['Dewan Tun Canselor', 'Exam Hall', 'MPH', 'Grand Hall']
        };

        const facultyList = ['FCI', 'FOE', 'FCM', 'FAC'];

        const facultyDetails = {
            'FCI': {
                'Level 1': ['Lab 1.1', 'Classroom A', 'Lobby', 'Admin'],
                'Level 2': ['Tutorial 2.1', 'Lab 2.2', 'Seminar 2', 'Meeting Room'],
                'Level 3': ['Server Room', 'Classroom C', 'Dean Office', 'Research Lab'],
                'Level 4': ['Final Year Project Lab', 'Staff Room', 'Storage', 'Roof Access']
            }
            // You can add FOE, FCM etc. here later
        };

        /* --- UI LOGIC --- */
        function toggleSidebar() {
            var mainSidebar = document.getElementById("mySidebar");
            var subSidebar = document.getElementById("homeSidebar");
            mainSidebar.classList.toggle("active");
            if (!mainSidebar.classList.contains("active")) {
                subSidebar.classList.remove("active");
            }
        }

        function toggleHomeMenu() {
            document.getElementById("homeSidebar").classList.toggle("active");
        }

        // STEP 1: Main Categories
        function loadMainCategories() {
            const body = document.getElementById('categoryBody');
            const title = document.getElementById('subHeaderTitle');
            const backBtn = document.getElementById('backBtn');

            title.innerText = "Categories";
            backBtn.style.display = 'none';
            body.innerHTML = `
                <button class="category-btn" onclick="showSubCategory('Facility')">Facility</button>
                <button class="category-btn" onclick="showSubCategory('Faculty')">Faculty</button>
                <button class="category-btn" onclick="showSubCategory('Hall')">Hall</button>
            `;
        }

        // STEP 2: Sub-Category (Facility, Hall, or List of Faculties)
        function showSubCategory(category) {
            const body = document.getElementById('categoryBody');
            const title = document.getElementById('subHeaderTitle');
            const backBtn = document.getElementById('backBtn');

            title.innerText = category;
            backBtn.style.display = 'block';
            backBtn.onclick = loadMainCategories;
            body.innerHTML = '';

            if (category === 'Faculty') {
                facultyList.forEach(fac => {
                    const btn = document.createElement('button');
                    btn.className = 'category-btn';
                    btn.innerText = fac;
                    btn.onclick = () => selectFaculty(fac);
                    body.appendChild(btn);
                });
            } else {
                const grid = document.createElement('div');
                grid.className = 'category-grid-container';
                campusData[category].forEach(item => {
                    const square = document.createElement('div');
                    square.className = 'sub-item-square';
                    square.innerText = item;
                    grid.appendChild(square);
                });
                body.appendChild(grid);
            }
        }

        // STEP 3: Faculty Levels (Picture 1)
        function selectFaculty(facultyName) {
            const body = document.getElementById('categoryBody');
            const backBtn = document.getElementById('backBtn');

            body.innerHTML = `
                <div class="chosen-box">${facultyName}</div>
                <button class="level-btn" onclick="selectLevel('${facultyName}', 'Level 1')">level 1</button>
                <button class="level-btn" onclick="selectLevel('${facultyName}', 'Level 2')">level 2</button>
                <button class="level-btn" onclick="selectLevel('${facultyName}', 'Level 3')">level 3</button>
                <button class="level-btn" onclick="selectLevel('${facultyName}', 'Level 4')">level 4</button>
            `;
            backBtn.onclick = () => showSubCategory('Faculty');
        }

        // STEP 4: Level Classes (Picture 2)
        function selectLevel(facultyName, levelName) {
            const body = document.getElementById('categoryBody');
            const backBtn = document.getElementById('backBtn');

            body.innerHTML = `
                <div class="chosen-box">${facultyName}</div>
                <div class="chosen-level-box">${levelName}</div>
                <p style="margin: 15px 0; font-weight: bold; text-align:center;">List of classes</p>
                <div class="class-grid" id="classGrid"></div>
            `;

            const grid = document.getElementById('classGrid');
            const classes = (facultyDetails[facultyName] && facultyDetails[facultyName][levelName]) 
                            ? facultyDetails[facultyName][levelName] 
                            : ['Room 1', 'Room 2', 'Room 3', 'Room 4'];

            classes.forEach(cls => {
                const item = document.createElement('div');
                item.className = 'class-item-btn';
                item.innerText = cls;
                grid.appendChild(item);
            });

            backBtn.onclick = () => selectFaculty(facultyName);
        }

        /* --- MAP & GPS --- */
        var map = L.map('map', { zoomControl: false }).setView([2.9276, 101.6418], 18);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 20 }).addTo(map);

        var userMarker, isFollowing = false;
        var navIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/506/506185.png', 
            iconSize: [40, 40], iconAnchor: [20, 20]
        });

        function locateUser() {
            isFollowing = true;
            document.getElementById('gpsBtn').classList.add('active-gps');
            map.locate({setView: true, maxZoom: 18, watch: true, enableHighAccuracy: true});
        }

        map.on('locationfound', function(e) {
            if (!userMarker) {
                userMarker = L.marker(e.latlng, {icon: navIcon}).addTo(map);
            } else {
                userMarker.setLatLng(e.latlng);
            }
            if (isFollowing) map.panTo(e.latlng, { animate: true, duration: 1.0 });
        });

        map.on('dragstart', () => {
            isFollowing = false;
            document.getElementById('gpsBtn').classList.remove('active-gps');
        });
    </script>
</body>
</html>
