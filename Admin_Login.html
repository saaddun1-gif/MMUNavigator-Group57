<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style_login.css">
    </head>

    <body>
        <main>
            <section id="login">
                <h1>MMU Navigator Admin Login</h1>
            <form action="index.php" method="POST">
                <div>
                <label for="email">Account ID:</label>
                <input type="email" id="email" name="email" placeholder="ID" required    >
                </div>

                <br>

                <div>
                <label for="fpass">Password:</label>
                <input type="password" id="fpass" name="fpass" placeholder="Password" required>
                </div>

                <br>

                <div>
                    <input type="submit">
                </div>
            </section>
        </form>
    </main>
</html>
