<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMU Navigator - Admin Portal</title>
    
    <!-- Flask CSS Link -->
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
    
    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body onload="initApp()">

    <!-- Menu Toggle -->
    <button class="menu-toggle-btn" onclick="toggleSidebar()">
        <img src="{{ url_for('static', filename='menu.png') }}" class="icon-img">
    </button>

    <!-- Top Right Controls -->
    <div class="top-right-container">
        <a href="guide.html" class="control-btn">
            <img src="{{ url_for('static', filename='question.png') }}" class="icon-img">
        </a>
        <button id="gpsBtn" class="control-btn" onclick="locateUser()">
            <img src="{{ url_for('static', filename='gps.png') }}" class="icon-img">
        </button>
    </div>

    <!-- Main Sidebar -->
    <div class="sidebar" id="mySidebar">
        <button class="nav-btn" onclick="toggleSidebar()" style="background: #f0f0f0;">
            <img src="{{ url_for('static', filename='menu.png') }}" class="icon-img">
        </button>
        <button class="nav-btn" onclick="openChatMenu()">
            <img src="{{ url_for('static', filename='chatbox.png') }}" class="icon-img">
        </button>
        <button class="nav-btn" onclick="openHomeMenu()">
            <img src="{{ url_for('static', filename='home.png') }}" class="icon-img">
        </button>
        
        <!-- Red Setting Button for Admin -->
        <button id="settingBtn" class="nav-btn" onclick="toggleEditMode()">
            <img src="{{ url_for('static', filename='setting.png') }}" class="icon-img">
        </button>
        
        <div style="margin-top: auto;">
            <button class="nav-btn" style="border-radius: 50%; overflow: hidden;">
                <img src="{{ url_for('static', filename='admin.png') }}" class="profile-img">
            </button>
        </div>
    </div>

    <!-- Home Sidebar (Categories/Faculty/Levels) -->
    <div class="sub-sidebar" id="homeSidebar">
        <div id="topHeaderBox" class="header-box" style="display: none;"></div>
        <h1 id="subHeaderTitle">Categories</h1> 
        <div id="categoryBody" class="category-body-content" style="width: 100%;"></div>
        <button id="backBtn" class="back-link" onclick="loadMainCategories()" style="display:none;">← Back</button>
    </div>

    <!-- Chat Sidebar (Admin Templates) -->
    <div class="sub-sidebar" id="chatSidebar">
        <h1>AI Chat box</h1>
        <div class="chat-messages-container" id="chatMessages">
            <div class="bot-msg">Hello! How can I help you navigate MMU today?</div>
            <div id="templateDisplay" class="template-preview-area"></div>
        </div>

        <!-- Admin Chat Settings -->
        <div id="chatAdminSettings" style="display: none; width: 100%; margin-bottom: 20px;">
            <hr style="border: 1px solid black; margin: 10px 0;">
            <p style="font-weight: bold; margin-bottom: 5px;">Add New Question:</p>
            <input type="text" id="templateInput" class="admin-text-input" placeholder="Type here...">
            <button class="admin-save-btn" onclick="addChatTemplate()">Save</button>
            <div id="adminTemplateList" style="width: 100%; margin-top: 10px;"></div>
        </div>

        <div class="chat-input-wrapper" id="chatInputArea">
            <input type="text" class="chat-input-field" placeholder="Ask me anything...">
        </div>
    </div>

    <!-- Search Box -->
    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Search MMU locations...">
    </div>
    
    <div id="map"></div>

    <script>
        /* --- APP STATE & DATA --- */
        let isEditMode = false; 
        let currentView = ''; 
        let currentCategory = ''; 
        let currentFaculty = '';
        let currentLevel = '';
        let map;
        let userMarker;

        let chatTemplates = ["Where is the Library?", "How to go to FCI?"];
        
        // Data structure (No SQL used as per project rules)
        const campusData = {
            'Facility': ['Library', 'Surau', 'Gym', 'Cafe'],
            'Hall': ['Exam Hall', 'MPH'],
            'Faculty': {
                'FCI': {
                    'Level 1': ['CR 101', 'CR 102'],
                    'Level 2': ['CR 201', 'Meeting Room']
                }
            }
        };

        function initApp() { initMap(); loadMainCategories(); }

        /* --- GPS & MAP LOGIC --- */
        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([2.9276, 101.6418], 18);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            map.on('locationfound', (e) => {
                if (userMarker) map.removeLayer(userMarker);
                userMarker = L.marker(e.latlng).addTo(map).bindPopup("Admin is here").openPopup();
                
                fetch('/live-location', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ latitude: e.latlng.lat, longitude: e.latlng.lng })
                });
            });
        }

        function locateUser() { map.locate({setView: true, maxZoom: 18, watch: true}); }

        /* --- ADMIN EDIT MODE --- */
        function toggleEditMode() {
            isEditMode = !isEditMode;
            const btn = document.getElementById('settingBtn');
            isEditMode ? btn.classList.add('setting-on') : btn.classList.remove('setting-on');
            refreshScreen();
        }

        function refreshScreen() {
            if (currentView === 'chat') openChatMenu();
            else if (currentView === 'home') {
                if (currentLevel) showClasses(currentFaculty, currentLevel);
                else if (currentFaculty) showFacultyLevels(currentFaculty);
                else if (currentCategory) showSubCategory(currentCategory);
                else loadMainCategories();
            }
        }

        /* --- NAVIGATION --- */
        function toggleSidebar() {
            document.getElementById("mySidebar").classList.toggle("active");
            if (!document.getElementById("mySidebar").classList.contains("active")) {
                document.querySelectorAll('.sub-sidebar').forEach(s => s.classList.remove('active'));
            }
        }

        function openHomeMenu() {
            currentView = 'home';
            document.querySelectorAll('.sub-sidebar').forEach(s => s.classList.remove('active'));
            document.getElementById("homeSidebar").classList.add("active");
            refreshScreen();
        }

        function openChatMenu() {
            currentView = 'chat';
            document.querySelectorAll('.sub-sidebar').forEach(s => s.classList.remove('active'));
            document.getElementById("chatSidebar").classList.add("active");
            
            renderTemplatePreview();
            document.getElementById('chatAdminSettings').style.display = isEditMode ? 'block' : 'none';
            document.getElementById('chatInputArea').style.display = isEditMode ? 'none' : 'block';
            if (isEditMode) renderAdminTemplateList();
        }

        /* --- HOME CONTENT (CRUD) --- */
        function loadMainCategories() {
            currentCategory = ''; currentFaculty = ''; currentLevel = '';
            const body = document.getElementById('categoryBody');
            document.getElementById('topHeaderBox').style.display = 'none';
            document.getElementById('subHeaderTitle').style.display = 'block';
            document.getElementById('backBtn').style.display = 'none';
            body.innerHTML = '';

            ['Facility', 'Faculty', 'Hall'].forEach(cat => {
                body.innerHTML += `<button class="category-btn-wide" onclick="showSubCategory('${cat}')">${cat}</button>`;
            });
        }

        function showSubCategory(category) {
            currentCategory = category; currentFaculty = ''; currentLevel = '';
            const body = document.getElementById('categoryBody');
            document.getElementById('topHeaderBox').innerText = category;
            document.getElementById('topHeaderBox').style.display = 'block';
            document.getElementById('subHeaderTitle').style.display = 'none';
            document.getElementById('backBtn').style.display = 'block';
            document.getElementById('backBtn').onclick = loadMainCategories;
            
            body.innerHTML = '';
            const listContainer = document.createElement('div');
            listContainer.className = (category === 'Facility') ? 'grid-container-2col' : 'wide-list-container';

            const items = (category === 'Faculty') ? Object.keys(campusData[category]) : campusData[category];

            items.forEach((item, index) => {
                const container = document.createElement('div');
                container.className = 'item-container';
                const btnClass = (category === 'Facility') ? 'facility-grid-btn' : 'category-btn-wide';
                
                container.innerHTML = `<div class="${btnClass}">${item}</div>`;
                if (category === 'Faculty') container.onclick = () => showFacultyLevels(item);

                if (isEditMode) {
                    const del = document.createElement('button');
                    del.className = 'delete-badge'; del.innerText = 'X';
                    del.onclick = (e) => {
                        e.stopPropagation();
                        if (category === 'Faculty') delete campusData['Faculty'][item];
                        else campusData[category].splice(index, 1);
                        showSubCategory(category);
                    };
                    container.appendChild(del);
                }
                listContainer.appendChild(container);
            });
            body.appendChild(listContainer);
            if (isEditMode) renderAddButton(body, () => {
                const val = prompt(`New ${category}:`);
                if (val) { if(category==='Faculty') campusData['Faculty'][val]={}; else campusData[category].push(val); showSubCategory(category); }
            });
        }

        function showFacultyLevels(fac) {
            currentFaculty = fac; currentLevel = '';
            const body = document.getElementById('categoryBody');
            document.getElementById('topHeaderBox').innerText = fac;
            document.getElementById('backBtn').onclick = () => showSubCategory('Faculty');
            body.innerHTML = '';

            const list = document.createElement('div');
            list.className = 'wide-list-container';
            Object.keys(campusData['Faculty'][fac]).forEach(lvl => {
                const container = document.createElement('div');
                container.className = 'item-container';
                container.onclick = () => showClasses(fac, lvl);
                container.innerHTML = `<div class="category-btn-wide">${lvl}</div>`;
                if (isEditMode) {
                    const del = document.createElement('button'); del.className = 'delete-badge'; del.innerText = 'X';
                    del.onclick = (e) => { e.stopPropagation(); delete campusData['Faculty'][fac][lvl]; showFacultyLevels(fac); };
                    container.appendChild(del);
                }
                list.appendChild(container);
            });
            body.appendChild(list);
            if (isEditMode) renderAddButton(body, () => {
                const val = prompt(`New Level for ${fac}:`);
                if(val) { campusData['Faculty'][fac][val]=[]; showFacultyLevels(fac); }
            });
        }

        function showClasses(fac, lvl) {
            currentLevel = lvl;
            const body = document.getElementById('categoryBody');
            document.getElementById('topHeaderBox').innerHTML = `${fac}<br><br>${lvl}`;
            document.getElementById('backBtn').onclick = () => showFacultyLevels(fac);
            body.innerHTML = '<p style="text-align:center; margin-bottom:10px;">List of classes</p>';

            const grid = document.createElement('div');
            grid.className = 'grid-container-2col';
            campusData['Faculty'][fac][lvl].forEach((cls, i) => {
                const container = document.createElement('div');
                container.className = 'item-container';
                container.innerHTML = `<div class="class-grid-btn">${cls}</div>`;
                if (isEditMode) {
                    const del = document.createElement('button'); del.className = 'delete-badge'; del.innerText = 'X';
                    del.onclick = (e) => { e.stopPropagation(); campusData['Faculty'][fac][lvl].splice(i, 1); showClasses(fac, lvl); };
                    container.appendChild(del);
                }
                grid.appendChild(container);
            });
            body.appendChild(grid);
            if (isEditMode) renderAddButton(body, () => {
                const val = prompt(`New Class for ${lvl}:`);
                if(val) { campusData['Faculty'][fac][lvl].push(val); showClasses(fac, lvl); }
            });
        }

        function renderAddButton(parent, onClick) {
            const b = document.createElement('button'); b.className = 'add-item-wide-btn'; b.innerText = '+';
            b.onclick = onClick; parent.appendChild(b);
        }

        /* --- CHAT TEMPLATE LOGIC --- */
        function addChatTemplate() {
            const val = document.getElementById('templateInput').value;
            if(val) { chatTemplates.push(val); document.getElementById('templateInput').value = ''; renderAdminTemplateList(); renderTemplatePreview(); }
        }
        function deleteChatTemplate(i) { chatTemplates.splice(i, 1); renderAdminTemplateList(); renderTemplatePreview(); }
        function renderTemplatePreview() {
            const c = document.getElementById('templateDisplay'); c.innerHTML = '';
            chatTemplates.forEach(t => c.innerHTML += `<button class="chat-pill">${t}</button>`);
        }
        function renderAdminTemplateList() {
            const c = document.getElementById('adminTemplateList'); c.innerHTML = '';
            chatTemplates.forEach((t, i) => c.innerHTML += `<div class="admin-template-row"><span>${t}</span><button onclick="deleteChatTemplate(${i})">X</button></div>`);
        }
    </script>
</body>
</html>
