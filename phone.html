<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMU Navigator - Mobile</title>
    <link rel="stylesheet" href="mobile.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Search bar">
    </div>

    <div class="category-popup" id="categoryMenu">
        <button class="menu-item">Facility</button>
        <button class="menu-item">Faculty</button>
        <button class="menu-item">Hall</button>
    </div>

    <div id="map"></div>

    <div class="bottom-nav">
        <button class="nav-icon" onclick="toggleCategories()">
            <img src="pin.png" alt="Pin">
        </button>
        
        <button class="nav-icon">
            <img src="chat.png" alt="Chat">
        </button>
        
        <button class="nav-icon">
            <img src="menu.png" alt="Menu">
        </button>
    </div>

    <script>
        // Function to show/hide categories when Pin is pressed
        function toggleCategories() {
            var menu = document.getElementById("categoryMenu");
            menu.classList.toggle("active");
        }

        // Setup the map
        var map = L.map('map', { zoomControl: false }).setView([2.9276, 101.6418], 17);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    </script>
</body>
</html>
