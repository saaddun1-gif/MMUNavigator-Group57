<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMU Navigator - Final Public Version</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='test.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" href="{{ url_for('static', filename='leaflet.css') }}" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body onload="initApp()">

    
    <button class="menu-toggle-btn" onclick="toggleSidebar()">
        <img src="menu.png" class="icon-img">
    </button>

    <div class="top-right-container">
        <a href="guide.html" class="control-btn">
            <img src="question.png" class="icon-img">
        </a>
        <button id="gpsBtn" class="control-btn" onclick="locateUser()">
            <img src="gps.png" class="icon-img">
        </button>
    </div>

    <div class="sidebar" id="mySidebar">
        <button class="nav-btn" onclick="toggleSidebar()" style="background: #f0f0f0;">
            <img src="menu.png" class="icon-img">
        </button>
        <button class="nav-btn" onclick="openChatMenu()"><img src="chatbox.png" class="icon-img"></button>
        <button class="nav-btn" onclick="openHomeMenu()"><img src="home.png" class="icon-img"></button>
        
        <div style="margin-top: auto;">
            <button class="nav-btn" style="border-radius: 50%; overflow: hidden;">
                <img src="admin.png" class="profile-img">
            </button>
        </div>
    </div>

    <div class="sub-sidebar" id="homeSidebar">
        <h1 id="subHeaderTitle">Categories</h1> 
        <div id="categoryBody" class="category-body-content"></div>
        <button id="backBtn" class="back-link" onclick="loadMainCategories()" style="display:none;">← Back</button>
    </div>

    <div class="sub-sidebar" id="chatSidebar">
        <h1>AI Chat box</h1>
        <div class="chat-messages-container" id="chatMessages">
            <div class="bot-msg">Hello! How can I help you navigate MMU today?</div>
        </div>
        <div class="chat-input-wrapper">
            <input type="text" id="userInput" class="chat-input-field" placeholder="Ask me anything...">
        </div>
    </div>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Search MMU locations...">
    </div>
    
    <div id="map"></div>

    <script>
        /* --- DATA STRUCTURES --- */
        const campusData = {
            'Facility': ['Library', 'Surau', 'Gym', 'Cafe', 'Bank', 'Clinic', 'Lab', 'Store'],
            'Hall': ['Dewan Tun Canselor', 'Exam Hall', 'MPH', 'Grand Hall']
        };

        const facultyList = ['FCI', 'FOE', 'FCM', 'FAC'];

        const facultyDetails = {
            'FCI': {
                'Level 1': ['Lab 1.1', 'Classroom A', 'Lobby', 'Admin'],
                'Level 2': ['Tutorial 2.1', 'Lab 2.2', 'Seminar 2', 'Meeting Room'],
                'Level 3': ['Server Room', 'Classroom C', 'Dean Office', 'Research Lab'],
                'Level 4': ['Final Year Project Lab', 'Staff Room', 'Storage', 'Roof Access']
            }
        };

        function initApp() {
            initMap();
            loadMainCategories();
        }

        /* --- SIDEBAR LOGIC --- */
        function toggleSidebar() {
            const sidebar = document.getElementById("mySidebar");
            const homeSidebar = document.getElementById("homeSidebar");
            const chatSidebar = document.getElementById("chatSidebar");
            sidebar.classList.toggle("active");
            if (!sidebar.classList.contains("active")) {
                homeSidebar.classList.remove("active");
                chatSidebar.classList.remove("active");
            }
        }

        function openHomeMenu() {
            document.getElementById("chatSidebar").classList.remove("active");
            document.getElementById("mySidebar").classList.add("active");
            document.getElementById("homeSidebar").classList.add("active");
            loadMainCategories();
        }

        function openChatMenu() {
            document.getElementById("homeSidebar").classList.remove("active");
            document.getElementById("mySidebar").classList.add("active");
            document.getElementById("chatSidebar").classList.add("active");
        }

        /* --- CATEGORY & FACULTY LOGIC --- */
        function loadMainCategories() {
            const body = document.getElementById('categoryBody');
            const title = document.getElementById('subHeaderTitle');
            const backBtn = document.getElementById('backBtn');
            title.innerText = "Categories";
            backBtn.style.display = 'none';
            body.innerHTML = `
                <button class="category-btn-wide" onclick="showSubCategory('Facility')">Facility</button>
                <button class="category-btn-wide" onclick="showSubCategory('Faculty')">Faculty</button>
                <button class="category-btn-wide" onclick="showSubCategory('Hall')">Hall</button>
            `;
        }

        function showSubCategory(category) {
            const body = document.getElementById('categoryBody');
            const title = document.getElementById('subHeaderTitle');
            const backBtn = document.getElementById('backBtn');
            title.innerText = category;
            backBtn.style.display = 'block';
            backBtn.onclick = loadMainCategories;
            body.innerHTML = '';

            if (category === 'Faculty') {
                facultyList.forEach(fac => {
                    body.innerHTML += `<button class="category-btn-wide" onclick="selectFaculty('${fac}')">${fac}</button>`;
                });
            } else {
                const grid = document.createElement('div');
                // Facility uses 2-column grid, Hall uses 1-column wide list
                grid.className = (category === 'Facility') ? 'grid-container-2col' : 'wide-list-container';
                
                campusData[category].forEach(item => {
                    const btnClass = (category === 'Facility') ? 'facility-grid-btn' : 'category-btn-wide';
                    grid.innerHTML += `<div class="${btnClass}">${item}</div>`;
                });
                body.appendChild(grid);
            }
        }

        function selectFaculty(facultyName) {
            const body = document.getElementById('categoryBody');
            const backBtn = document.getElementById('backBtn');
            body.innerHTML = `
                <div class="chosen-box">${facultyName}</div>
                <button class="level-btn" onclick="selectLevel('${facultyName}', 'Level 1')">level 1</button>
                <button class="level-btn" onclick="selectLevel('${facultyName}', 'Level 2')">level 2</button>
                <button class="level-btn" onclick="selectLevel('${facultyName}', 'Level 3')">level 3</button>
                <button class="level-btn" onclick="selectLevel('${facultyName}', 'Level 4')">level 4</button>
            `;
            backBtn.onclick = () => showSubCategory('Faculty');
        }

        function selectLevel(facultyName, levelName) {
            const body = document.getElementById('categoryBody');
            const backBtn = document.getElementById('backBtn');
            body.innerHTML = `
                <div class="chosen-box">${facultyName}</div>
                <div class="chosen-level-box">${levelName}</div>
                <p style="margin: 15px 0; font-weight: bold; text-align:center;">List of classes</p>
                <div class="class-grid" id="classGrid"></div>
            `;
            const grid = document.getElementById('classGrid');
            const classes = (facultyDetails[facultyName] && facultyDetails[facultyName][levelName]) 
                            ? facultyDetails[facultyName][levelName] 
                            : ['Room 1', 'Room 2', 'Room 3', 'Room 4'];

            classes.forEach(cls => {
                grid.innerHTML += `<div class="class-item-btn">${cls}</div>`;
            });
            backBtn.onclick = () => selectFaculty(facultyName);
        }

        /* --- MAP & GPS --- */
        var map, userMarker, isFollowing = false;
        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([2.9276, 101.6418], 18);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 20 }).addTo(map);
        }

        function locateUser() {
            isFollowing = true;
            document.getElementById('gpsBtn').classList.add('active-gps');
            map.locate({setView: true, maxZoom: 18, watch: true, enableHighAccuracy: true});
        }

        function onLocationFound(e) {
            if (!userMarker) {
                userMarker = L.marker(e.latlng).addTo(map);
            } else {
                userMarker.setLatLng(e.latlng);
            }
            if (isFollowing) map.panTo(e.latlng);
        }
        
        // Leaflet events
        initApp(); // Fallback trigger
        window.addEventListener('load', () => {
            map.on('locationfound', onLocationFound);
            map.on('dragstart', () => {
                isFollowing = false;
                document.getElementById('gpsBtn').classList.remove('active-gps');
            });
        });
    </script>
    <script>
        // This connects your website to main.py via server.py
        (function() {
            const API_URL = 'http://localhost:5000';
            
            async function sendToPython(message) {
                try {
                    const response = await fetch(`${API_URL}/chat`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ message: message })
                    });
                    
                    const data = await response.json();
                    return data.reply;
                } catch (error) {
                    console.error('Connection error:', error);
                    return '❌ Cannot connect to Python server. Make sure server.py is running!';
                }
            }
            
            function addMessage(text, isUser) {
                const chatContainer = document.getElementById('chatMessages');
                const messageDiv = document.createElement('div');
                messageDiv.className = isUser ? 'user-msg' : 'bot-msg';
                messageDiv.style.whiteSpace = 'pre-line';
                messageDiv.textContent = text;
                chatContainer.appendChild(messageDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
            
            async function handleUserInput() {
                const input = document.getElementById('userInput');
                const message = input.value.trim();
                
                if (!message) return;
                
                // Clear input and show user message
                input.value = '';
                addMessage(message, true);
                
                // Show typing indicator
                const typingDiv = document.createElement('div');
                typingDiv.className = 'bot-msg';
                typingDiv.textContent = '🤖 Thinking...';
                document.getElementById('chatMessages').appendChild(typingDiv);
                
                // Get response from Python (using your main.py logic)
                const reply = await sendToPython(message);
                
                // Remove typing indicator
                typingDiv.remove();
                
                // Add bot reply
                addMessage(reply, false);
            }
            
            // Handle Enter key
            document.getElementById('userInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    handleUserInput();
                }
            });
            
            // Make fillChat work with buttons
            window.fillChat = function(text) {
                document.getElementById('userInput').value = text;
                handleUserInput();
            };
            
            console.log('✅ Chatbot connected to Python backend');
        })();
    </script>
</body>
</html>
