<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMU Navigator - Public User</title>
    
    
    <link rel="stylesheet" href="{{ url_for('static', filename='test.css') }}">
    
    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
</head>
<body onload="initApp()">

    <!-- Menu Toggle -->
    <button class="menu-toggle-btn" onclick="toggleSidebar()">
        <img src="{{ url_for('static', filename='menu.png') }}" class="icon-img">
    </button>

    <!-- Top Right Controls -->
    <div class="top-right-container">
        <a href="guide.html" class="control-btn">
            <img src="{{ url_for('static', filename='question.png') }}" class="icon-img">
        </a>
        <button id="gpsBtn" class="control-btn" onclick="locateUser()">
            <img src="{{ url_for('static', filename='gps.png') }}" class="icon-img">
        </button>
    </div>

    <!-- Sidebar Menu -->
    <div class="sidebar" id="mySidebar">
        <button class="nav-btn" onclick="toggleSidebar()" style="background: #f0f0f0;">
            <img src="{{ url_for('static', filename='menu.png') }}" class="icon-img">
        </button>
        <button class="nav-btn" onclick="openChatMenu()">
            <img src="{{ url_for('static', filename='chatbox.png') }}" class="icon-img">
        </button>
        <button class="nav-btn" onclick="openHomeMenu()">
            <img src="{{ url_for('static', filename='home.png') }}" class="icon-img">
        </button>
        
         <div style="margin-top: auto;">
            <a href="{{ url_for('login') }}" class="nav-btn" style="border-radius: 50%; overflow: hidden; display: flex; justify-content: center; align-items: center; background: none; border: none;">
             <img src="{{ url_for('static', filename='admin.png') }}" class="profile-img" style="width: 100%; height: 100%; object-fit: cover;">
            </a>
         </div>
        </div>
    </div>

    <!-- Home Menu (Folders) -->
    <div class="sub-sidebar" id="homeSidebar">
        <div id="topHeaderBox" class="header-box" style="display: none;"></div>
        <h1 id="subHeaderTitle">Categories</h1> 
        <div id="categoryBody" class="category-body-content" style="width: 100%;"></div>
        <button id="backBtn" class="back-link" onclick="loadMainCategories()" style="display:none;">← Back</button>
    </div>

    <!-- Chat Menu -->
    <div class="sub-sidebar" id="chatSidebar">
        <h1>AI Chat box</h1>
        <div class="chat-messages-container" id="chatMessages">
            <div class="bot-msg">Hello! How can I help you navigate MMU today?</div>
            <div class="template-preview-area">
                <button class="chat-pill" onclick="fillChat('Where is the Library?')">Where is the Library?</button>
                <button class="chat-pill" onclick="fillChat('How to go to FCI?')">How to go to FCI?</button>
            </div>
        </div>
        <div class="chat-input-wrapper">
            <input type="text" id="userInput" class="chat-input-field" placeholder="Ask me anything...">
        </div>
    </div>

    <!-- Search Bar -->
    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Search MMU locations...">
    </div>
    
    <div id="map"></div>

    <script>
        let map;
        let userMarker = null;
        let targetPin = null; 
        let routingControl = null;

        // Data for MMU Navigator
        const campusData = {
            'Facility': ['Library', 'Surau', 'Gym', 'Cafe', 'Bank', 'Clinic', 'Lab', 'Store'],
            'Hall': ['Dewan Tun Canselor', 'Exam Hall', 'MPH', 'Grand Hall'],
            'Faculty': {
                'FCI': {
                    'Level 1': ['CR 101', 'CR 102', 'Lab 1', 'Lab 2'],
                    'Level 2': ['CR 201', 'CR 202', 'Meeting Room'],
                    'Level 3': ['CR 301', 'Staff Room'],
                    'Level 4': ['CR 401', 'CR 402']
                },
                'FCM': {
                    'Level 1': ['Lab A', 'Lab B'],
                    'Level 2': ['CR 1', 'CR 2']
                },
                'FAIE': {
                    'Level 1': ['Lab A', 'Lab B'],
                    'Level 2': ['CR 1', 'CR 2']
                },
                'FCA': {
                    'Level 1': ['Lab A', 'Lab B'],
                    'Level 2': ['CR 1', 'CR 2']
                }
            }
        };

        function initApp() {
            initMap();
            loadMainCategories();
        }

        /* --- GPS & MAP LOGIC --- */
function initApp() {
        initMap();
        loadMainCategories();
    }

    function initMap() {
        // Initialize Map
        map = L.map('map', { zoomControl: false }).setView([2.9276, 101.6418], 18);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 1. Initialize Routing Control with Walking Profile
        routingControl = L.Routing.control({
            waypoints: [],
            router: L.Routing.osrmv1({
                serviceUrl: 'https://routing.openstreetmap.de/routed-foot/route/v1',
                profile: 'foot',
                useHints: false
            }),
            routeWhileDragging: false,
            show: false,
            addWaypoints: false,
            lineOptions: {
                styles: [{ color: 'red', opacity: 0.7, weight: 5, dashArray: '10, 10' }] 
            },
            createMarker: function() { return null; }
        }).addTo(map);

        // 2. LIVE LOCATION LOGIC
        map.on('locationfound', function(e) {
            const latlng = e.latlng;
            if (!userMarker) {
                userMarker = L.circleMarker(latlng, {
                    radius: 8, fillColor: "#3388ff", color: "#fff", weight: 2, opacity: 1, fillOpacity: 0.8
                }).addTo(map);
            } else {
                userMarker.setLatLng(latlng);
            }
            
            // CRITICAL: This line calculates distance the moment your location is found
            updateNavigationStatus(); 
        });

        // 3. PINNING LOGIC
        map.on('click', function(e) {
            if (targetPin) {
                targetPin.setLatLng(e.latlng);
            } else {
                targetPin = L.marker(e.latlng, { draggable: true }).addTo(map);
                targetPin.on('dragend', updateNavigationStatus);
            }
            targetPin.bindPopup("Calculating...").openPopup();
            updateNavigationStatus();
        });

        // 4. DISTANCE DISPLAY LOGIC
        routingControl.on('routesfound', function(e) {
            const routes = e.routes;
            const summary = routes[0].summary;
            
            const distanceText = summary.totalDistance > 1000 
                ? (summary.totalDistance / 1000).toFixed(2) + "km" 
                : Math.round(summary.totalDistance) + "m";
            const timeMin = Math.round(summary.totalTime / 60);

            // Update search bar
            const searchInput = document.querySelector('.search-bar');
            if (searchInput) searchInput.placeholder = `${distanceText} (${timeMin} min walk)`;

            // Update pin popup
            if (targetPin) {
                targetPin.setPopupContent(`
                    <div style="text-align: center;">
                        <strong>Destination</strong><br>
                        <b style="color: red;">${distanceText}</b><br>
                        <small>${timeMin} min walk</small>
                    </div>
                `).openPopup();
            }
        });
    }

    function updateNavigationStatus() {
        if (userMarker && targetPin) {
            routingControl.setWaypoints([
                L.latLng(userMarker.getLatLng()),
                L.latLng(targetPin.getLatLng())
            ]);
        }
    }

    function locateUser() {
        map.locate({setView: true, maxZoom: 18, watch: true}); 
    }
        

        /* --- NAVIGATION LOGIC --- */
        function toggleSidebar() {
            document.getElementById("mySidebar").classList.toggle("active");
            if (!document.getElementById("mySidebar").classList.contains("active")) {
                document.querySelectorAll('.sub-sidebar').forEach(s => s.classList.remove('active'));
            }
        }

        function openHomeMenu() {
            document.querySelectorAll('.sub-sidebar').forEach(s => s.classList.remove('active'));
            document.getElementById("homeSidebar").classList.add("active");
            loadMainCategories();
        }

        function openChatMenu() {
            document.querySelectorAll('.sub-sidebar').forEach(s => s.classList.remove('active'));
            document.getElementById("chatSidebar").classList.add("active");
        }

        /* --- HOME CONTENT LOGIC --- */
        function loadMainCategories() {
            const body = document.getElementById('categoryBody');
            document.getElementById('topHeaderBox').style.display = 'none';
            document.getElementById('subHeaderTitle').innerText = "Categories";
            document.getElementById('subHeaderTitle').style.display = 'block';
            document.getElementById('backBtn').style.display = 'none';
            body.innerHTML = '';

            ['Facility', 'Faculty', 'Hall'].forEach(cat => {
                body.innerHTML += `<button class="category-btn-wide" onclick="showSubCategory('${cat}')">${cat}</button>`;
            });
        }

        function showSubCategory(category) {
            const body = document.getElementById('categoryBody');
            document.getElementById('topHeaderBox').innerText = category;
            document.getElementById('topHeaderBox').style.display = 'block';
            document.getElementById('subHeaderTitle').style.display = 'none';
            document.getElementById('backBtn').style.display = 'block';
            document.getElementById('backBtn').onclick = loadMainCategories;
            body.innerHTML = '';

            if (category === 'Faculty') {
                Object.keys(campusData['Faculty']).forEach(fac => {
                    body.innerHTML += `<button class="category-btn-wide" onclick="showFacultyLevels('${fac}')">${fac}</button>`;
                });
            } else {
                const listContainer = document.createElement('div');
                listContainer.className = (category === 'Facility') ? 'grid-container-2col' : 'wide-list-container';
                campusData[category].forEach(item => {
                    const btnClass = (category === 'Facility') ? 'facility-grid-btn' : 'category-btn-wide';
                    listContainer.innerHTML += `<div class="${btnClass}">${item}</div>`;
                });
                body.appendChild(listContainer);
            }
        }

        function showFacultyLevels(facultyName) {
            const body = document.getElementById('categoryBody');
            document.getElementById('topHeaderBox').innerText = facultyName;
            document.getElementById('backBtn').onclick = () => showSubCategory('Faculty');
            body.innerHTML = '';

            Object.keys(campusData['Faculty'][facultyName]).forEach(level => {
                body.innerHTML += `<button class="category-btn-wide" onclick="showClasses('${facultyName}', '${level}')">${level}</button>`;
            });
        }

        function showClasses(facultyName, levelName) {
            const body = document.getElementById('categoryBody');
            document.getElementById('topHeaderBox').innerHTML = `${facultyName}<br><br>${levelName}`;
            document.getElementById('backBtn').onclick = () => showFacultyLevels(facultyName);
            body.innerHTML = '<p style="text-align:center; margin-bottom:10px;">List of classes</p>';

            const grid = document.createElement('div');
            grid.className = 'grid-container-2col';
            campusData['Faculty'][facultyName][levelName].forEach(cls => {
                grid.innerHTML += `<div class="class-grid-btn">${cls}</div>`;
            });
            body.appendChild(grid);
        }

        function fillChat(text) { document.getElementById('userInput').value = text; }
    </script>
</body>
</html>
