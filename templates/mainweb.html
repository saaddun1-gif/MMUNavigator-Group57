<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMU Navigator</title>
    
    <link rel="stylesheet" href="test.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        .user-msg {
            background: #007bff;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin: 8px;
            text-align: right;
            max-width: 80%;
            margin-left: auto;
        }
        
        .bot-msg {
            background: #e9ecef;
            color: black;
            padding: 10px;
            border-radius: 10px;
            margin: 8px;
            text-align: left;
            max-width: 80%;
        }
        
        .chat-messages-container {
            display: flex;
            flex-direction: column;
            height: 400px;
            overflow-y: auto;
            padding: 10px;
        }
    </style>
</head>
<body onload="initApp()">

    <button class="menu-toggle-btn" onclick="toggleSidebar()">
        <img src="menu.png" class="icon-img" alt="Menu">
    </button>

    <div class="top-right-container">
        <a href="guide.html" class="control-btn">
            <img src="question.png" class="icon-img" alt="Help">
        </a>
        <button id="gpsBtn" class="control-btn" onclick="locateUser()">
            <img src="gps.png" class="icon-img" alt="GPS">
        </button>
    </div>

    <div class="sidebar" id="mySidebar">
        <button class="nav-btn" onclick="toggleSidebar()" style="background: #f0f0f0;">
            <img src="menu.png" class="icon-img" alt="Menu">
        </button>
        <button class="nav-btn" onclick="openChatMenu()">
            <img src="chatbox.png" class="icon-img" alt="Chat">
        </button>
        <button class="nav-btn" onclick="openHomeMenu()">
            <img src="home.png" class="icon-img" alt="Home">
        </button>
        
        <div style="margin-top: auto;">
            <a href="Admin_Login.html">
                <button class="nav-btn" style="border-radius: 50%; overflow: hidden;">
                    <img src="admin.png" class="profile-img" alt="Profile">
                </button>
            </a>
        </div>
    </div>

    <div class="sub-sidebar" id="homeSidebar">
        <h1 id="subHeaderTitle">Categories</h1> 
        <div id="categoryBody" class="category-body-content" style="width: 100%;"></div>
        <button id="backBtn" class="back-link" onclick="loadMainCategories()" style="display:none;">← Back</button>
    </div>

    <div class="sub-sidebar" id="chatSidebar">
        <h1>AI Chat box</h1>
        <div class="chat-messages-container" id="chatMessages"></div>
        <div class="chat-input-wrapper">
            <input type="text" id="userInput" class="chat-input-field" placeholder="Ask me anything about MMU...">
        </div>
        <div class="template-preview-area" style="padding: 10px;">
            <button class="chat-pill" onclick="fillChat('Where is the Library?')">📚 Where is the Library?</button>
            <button class="chat-pill" onclick="fillChat('How to go to FCI?')">🏫 How to go to FCI?</button>
            <button class="chat-pill" onclick="fillChat('Where is the cafeteria?')">🍽️ Where is the cafeteria?</button>
        </div>
    </div>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Search MMU locations...">
    </div>
    
    <div id="map"></div>

    <script>
        // ============================================
        // MAP AND SIDEBAR FUNCTIONS
        // ============================================
        
        function initApp() {
            initMap();
            loadMainCategories();
            addBotMessage("Hello! How can I help you navigate MMU today?");
        }

        function initMap() {
            var map = L.map('map', { zoomControl: false }).setView([2.9276, 101.6418], 18);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        function locateUser() {
            alert("Finding your location...");
        }

        function toggleSidebar() {
            const sidebar = document.getElementById("mySidebar");
            sidebar.classList.toggle("active");
            if (!sidebar.classList.contains("active")) {
                closeAllSubSidebars();
            }
        }

        function closeAllSubSidebars() {
            document.querySelectorAll('.sub-sidebar').forEach(s => s.classList.remove('active'));
        }

        function openHomeMenu() {
            closeAllSubSidebars();
            document.getElementById("mySidebar").classList.add("active");
            document.getElementById("homeSidebar").classList.add("active");
            loadMainCategories();
        }

        function openChatMenu() {
            closeAllSubSidebars();
            document.getElementById("mySidebar").classList.add("active");
            document.getElementById("chatSidebar").classList.add("active");
        }

        const campusData = {
            'Facility': ['Library', 'Surau', 'Gym', 'Cafe', 'Bank', 'Clinic', 'Lab', 'Store'],
            'Hall': ['Dewan Tun Canselor', 'Exam Hall', 'MPH', 'Grand Hall'],
            'Faculty': ['FCI', 'FOE', 'FCM', 'FAC']
        };

        function loadMainCategories() {
            const body = document.getElementById('categoryBody');
            if (!body) return;
            document.getElementById('subHeaderTitle').innerText = "Categories";
            document.getElementById('backBtn').style.display = 'none';
            body.innerHTML = '';

            ['Facility', 'Faculty', 'Hall'].forEach(cat => {
                body.innerHTML += `<button class="category-btn-wide" onclick="showSubCategory('${cat}')">${cat}</button>`;
            });
        }

        function showSubCategory(category) {
            const body = document.getElementById('categoryBody');
            if (!body) return;
            document.getElementById('subHeaderTitle').innerText = category;
            document.getElementById('backBtn').style.display = 'block';
            body.innerHTML = '';

            const listContainer = document.createElement('div');
            listContainer.className = (category === 'Facility') ? 'grid-container-2col' : 'wide-list-container';

            campusData[category].forEach((item) => {
                const container = document.createElement('div');
                container.className = 'item-container';
                const btnClass = (category === 'Facility') ? 'facility-grid-btn' : 'category-btn-wide';
                container.innerHTML = `<div class="${btnClass}">${item}</div>`;
                listContainer.appendChild(container);
            });

            body.appendChild(listContainer);
        }

        // ============================================
        // CHATBOT FUNCTIONS - Connects to Python backend
        // ============================================
        
        const API_URL = 'http://localhost:5000';

        function addUserMessage(message) {
            const chatContainer = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'user-msg';
            messageDiv.textContent = message;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addBotMessage(message) {
            const chatContainer = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'bot-msg';
            messageDiv.style.whiteSpace = 'pre-line';
            messageDiv.textContent = message;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendToPython(message) {
            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                return data.reply;
            } catch (error) {
                console.error('Connection error:', error);
                return '❌ Cannot connect to Python server.\n\nMake sure to:\n1. Open terminal in project folder\n2. Run: python server.py\n3. Keep terminal open while using chat';
            }
        }

        async function handleUserInput() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Clear input and show user message
            input.value = '';
            addUserMessage(message);
            
            // Show typing indicator
            const typingDiv = document.createElement('div');
            typingDiv.className = 'bot-msg';
            typingDiv.textContent = '🤖 Typing...';
            document.getElementById('chatMessages').appendChild(typingDiv);
            
            // Get reply from Python
            const reply = await sendToPython(message);
            
            // Remove typing indicator
            typingDiv.remove();
            
            // Add bot reply
            addBotMessage(reply);
        }

        function fillChat(text) {
            const input = document.getElementById('userInput');
            input.value = text;
            handleUserInput();
        }

        // Handle Enter key
        document.addEventListener('DOMContentLoaded', function() {
            const input = document.getElementById('userInput');
            if (input) {
                input.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        handleUserInput();
                    }
                });
            }
        });

        // Make functions global
        window.fillChat = fillChat;
        window.handleUserInput = handleUserInput;
        window.toggleSidebar = toggleSidebar;
        window.openHomeMenu = openHomeMenu;
        window.openChatMenu = openChatMenu;
        window.locateUser = locateUser;
        window.loadMainCategories = loadMainCategories;
        window.showSubCategory = showSubCategory;
        window.initApp = initApp;
        window.addBotMessage = addBotMessage;
    </script>
</body>
</html>
