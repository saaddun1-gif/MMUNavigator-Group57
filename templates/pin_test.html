<!DOCTYPE html>
<html>
<head>
    <title>Live Walk Route</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
        <link rel="stylesheet" href="{{ url_for('static', filename='pin_test.css') }}">

    
    <style>
        #map { height: 600px; width: 100%; }
    </style>
</head>
<body>

    <h2>My Live Walking Route</h2>
    <div id="map"></div>

    <!-- Leaflet and Routing JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <script>
        // 1. Initialize Map without a view - it stays "blank" until location is found
const map = L.map('map');

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '©OpenStreetMap, ©CartoDB'
}).addTo(map);

let userMarker, routingControl, destinationMarker;
let hasFoundLocation = false; 

// 2. Clear Route Function
function clearRoute() {
    if (routingControl) { map.removeControl(routingControl); routingControl = null; }
    if (destinationMarker) { map.removeLayer(destinationMarker); destinationMarker = null; }
}

// 3. The GPS Watcher
if (navigator.geolocation) {
    navigator.geolocation.watchPosition(position => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const userLatLng = L.latLng(lat, lon);

        // Update pulsing blue dot
        if (!userMarker) {
            const pulsingIcon = L.divIcon({
                className: 'current-location-marker',
                iconSize: [15, 15]
            });
            userMarker = L.marker(userLatLng, { icon: pulsingIcon }).addTo(map);
        } else {
            userMarker.setLatLng(userLatLng);
        }

        // ONLY center the map the very first time we get a valid coordinate
        if (!hasFoundLocation) {
            map.setView(userLatLng, 17); 
            hasFoundLocation = true;
        }

        // Keep route starting point updated if walking
        if (routingControl) {
            const currentDest = routingControl.getWaypoints()[1].latLng;
            routingControl.setWaypoints([userLatLng, currentDest]);
        }

    }, (error) => {
        console.error("GPS Error:", error);
        // Fallback: If GPS fails after 5 seconds, jump to MMU Cyberjaya
        if (!hasFoundLocation) {
            map.setView([2.9279, 101.6413], 15);
            hasFoundLocation = true;
        }
    }, {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 5000 // Give it 5 seconds to find you before falling back
    });
}

// 4. Click to Pin
map.on('click', function(e) {
    if (!hasFoundLocation) return;

    if (destinationMarker) map.removeLayer(destinationMarker);
    destinationMarker = L.marker(e.latlng).addTo(map);
    
    if (routingControl) map.removeControl(routingControl);

    routingControl = L.Routing.control({
        waypoints: [userMarker.getLatLng(), e.latlng],
        router: L.Routing.osrmv1({ profile: 'foot' }),
        lineOptions: {
            styles: [{ color: '#2563eb', weight: 5, opacity: 0.8 }]
        },
        addWaypoints: false,
        draggableWaypoints: false
    }).addTo(map);
});

// Inside your watchPosition function:

if (!userMarker) {
    // Define the GIF icon
    const gifIcon = L.icon({
        iconUrl: '/static/cat-scuba.gif', // Put your GIF file in the static folder
        iconSize: [50, 50], // Adjust size to fit your GIF
        iconAnchor: [25, 50], // Point of the GIF that sits on the exact coordinate
        className: 'user-gif-style' // Optional: for extra CSS styling
    });

    userMarker = L.marker(userLatLng, { icon: gifIcon }).addTo(map);
} else {
    userMarker.setLatLng(userLatLng);
}
    </script>
</body>
</html>
