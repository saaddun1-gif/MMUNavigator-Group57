<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MMU Navigator Admin Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style_login.css') }}">
</head>
<body>
    <main>
        <section id="login">
            <h1>MMU Navigator Admin Login</h1>
            <form id="loginForm">
                <div>
                    <label for="username">Account ID:</label>
                    <input type="text" id="username" placeholder="Username" required>
                </div>
                <br>
                <div>
                    <label for="password">Password:</label>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <br>
                <div id="otpSection" style="display:none;">
                    <label for="otp">Enter OTP:</label>
                    <input type="text" id="otp" placeholder="6-digit code">
                    <span id="timer" style="color: red; font-weight: bold; margin-left: 10px;"></span>
                    <br><br>
                </div>
                <button type="submit" id="submitBtn">Login</button>
            </form>
            <p id="message" style="color: red; margin-top: 10px;"></p>
        </section>
    </main>

<script>
    const loginForm = document.getElementById('loginForm');
    const otpSection = document.getElementById('otpSection');
    const otpInput = document.getElementById('otp');
    const submitBtn = document.getElementById('submitBtn');
    const message = document.getElementById('message');
    const timerDisplay = document.getElementById('timer');
    
    let isOtpStep = false;
    let countdownInterval;

    function startTimer(durationInSeconds) {
        // Clear any existing timer instances
        clearInterval(countdownInterval);
        
        let timeRemaining = durationInSeconds;

        countdownInterval = setInterval(() => {
            let minutes = Math.floor(timeRemaining / 60);
            let seconds = timeRemaining % 60;

            // Format numbers to always be 2 digits (e.g., 02:00)
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;

            timerDisplay.innerText = `(${minutes}:${seconds})`;

            if (timeRemaining <= 0) {
                clearInterval(countdownInterval);
                timerDisplay.innerText = "(Expired)";
                otpInput.disabled = true;
                submitBtn.disabled = true;
                
                message.style.color = 'red';
                message.innerHTML = "OTP has expired. <a href='#' onclick='resetLoginForm()'>Click here to try again.</a>";
            }

            timeRemaining--;
        }, 1000);
    }

    function resetLoginForm() {
        clearInterval(countdownInterval);
        isOtpStep = false;
        otpSection.style.display = 'none';
        otpInput.disabled = false;
        otpInput.value = "";
        submitBtn.disabled = false;
        message.innerText = "";
        timerDisplay.innerText = "";
    }

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        message.innerText = "";
        message.style.color = 'red';

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const otp = otpInput.value;

        try {
            if (!isOtpStep) {
                // Step 1: Initial Login
                const response = await fetch('/Admin_Login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (response.ok && result.status === 'otp_sent') {
                    otpSection.style.display = 'block';
                    isOtpStep = true;
                    message.style.color = 'green';
                    message.innerText = "OTP sent to your email!";
                    
                    // Start 2-minute countdown (120 seconds)
                    startTimer(120); 
                } else {
                    message.innerText = result.message || "Login failed.";
                }
            } else {
                // Step 2: Verify OTP
                const response = await fetch('/verify-otp', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ otp })
                });

                const result = await response.json();

                if (response.ok && result.status === 'success') {
                    clearInterval(countdownInterval); // Stop timer on success
                    window.location.href = result.redirect;
                } else {
                    message.innerText = result.message || "Invalid OTP.";
                }
            }
        } catch (err) {
            message.innerText = "Connection error. Please check your server.";
        }
    });
</script>
</body>
</html>
