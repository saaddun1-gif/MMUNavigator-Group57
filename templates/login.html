<body>
    <div class="login-container">
        <!-- Login Form Section -->
        <div id="login-section">
            <form id="login-form" class="login-form">
                <h2>Welcome Back</h2>
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="login-btn">Next</button>
            </form>
        </div>

        <!-- OTP Section (Hidden initially) -->
        <div id="otp-section" style="display: none;">
            <form id="otp-form" class="login-form">
                <h2>Verify Email</h2>
                <p>Enter the 6-digit code sent to your admin email.</p>
                <div class="input-group">
                    <input type="text" id="otp-code" placeholder="000000" maxlength="6" required>
                </div>
                <button type="submit" class="login-btn">Verify & Login</button>
            </form>
        </div>
        <p id="message" style="color: red;"></p>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const otpForm = document.getElementById('otp-form');
        const loginSection = document.getElementById('login-section');
        const otpSection = document.getElementById('otp-section');
        const message = document.getElementById('message');

        // Step 1: Handle Username/Password
        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            const response = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            const result = await response.json();
            if (result.status === 'otp_sent') {
                loginSection.style.display = 'none';
                otpSection.style.display = 'block';
                message.innerText = '';
            } else {
                message.innerText = result.message;
            }
        };

        // Step 2: Handle OTP Verification
        otpForm.onsubmit = async (e) => {
            e.preventDefault();
            const response = await fetch('/verify-otp', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ otp: document.getElementById('otp-code').value })
            });
            const result = await response.json();
            if (result.status === 'success') {
                window.location.href = result.redirect; // Final move to dashboard
            } else {
                message.innerText = result.message;
            }
        };
    </script>
</body>
