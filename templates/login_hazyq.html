<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <!-- This line fixes the plain white page issue -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="login-container">
        <!-- Step 1: Login Form Section -->
        <div id="login-section">
            <form id="login-form" class="login-form">
                <h2>Welcome Back</h2>
                <p>Please enter your details</p>
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="login-btn">Next</button>
            </form>
        </div>

        <!-- Step 2: OTP Section (Hidden initially) -->
        <div id="otp-section" style="display: none;">
            <form id="otp-form" class="login-form">
                <h2>Verify Email</h2>
                <p>Enter the 6-digit code sent to your admin email.</p>
                <div class="input-group">
                    <input type="text" id="otp-code" placeholder="000000" maxlength="6" required autofocus>
                </div>
                <button type="submit" class="login-btn">Verify & Login</button>
            </form>
        </div>
        
        <!-- Error/Status Messages -->
        <p id="message" style="color: red; text-align: center; margin-top: 10px;"></p>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const otpForm = document.getElementById('otp-form');
        const loginSection = document.getElementById('login-section');
        const otpSection = document.getElementById('otp-section');
        const message = document.getElementById('message');

        // Step 1: Handle Username/Password
        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            message.innerText = "Sending code..."; // Give user feedback
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });
                
                const result = await response.json();
                
                if (response.ok && result.status === 'otp_sent') {
                    loginSection.style.display = 'none';
                    otpSection.style.display = 'block';
                    message.innerText = '';
                } else {
                    message.innerText = result.message || "Login failed";
                }
            } catch (err) {
                message.innerText = "Error connecting to server.";
            }
        };

        // Step 2: Handle OTP Verification
        otpForm.onsubmit = async (e) => {
            e.preventDefault();
            try {
                const response = await fetch('/verify-otp', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ otp: document.getElementById('otp-code').value })
                });
                
                const result = await response.json();
                
                if (response.ok && result.status === 'success') {
                    window.location.href = result.redirect; 
                } else {
                    message.innerText = result.message || "Invalid OTP";
                }
            } catch (err) {
                message.innerText = "Error verifying code.";
            }
        };
    </script>
</body>
</html>
