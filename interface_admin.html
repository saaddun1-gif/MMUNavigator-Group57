<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Navigator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <link rel="stylesheet" href="menu.css">
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <div class="icon" oneclick "filter map('menu')" >☰</div>
            <div class="icon" oneclick "filter map('chatbox')">💬</div>
            <div class="icon" oneclick "filter map('menu')">🏠</div>
            <div class="add-btn" pneclick "filter map('')">+</div>
            
            <div style="margin-top: auto;" class="icon">👤</div>
        </div>

        <div class="main">
            <input type="text" class="search-bar" placeholder="Search bar">
            
            <div id="map-area">
                <h2 id="status-text">Map View</h2>
                
                <div class="distance-tool">
                    <strong>Distance Tool</strong><br>
                    <small>Point A to Point B</small><br>
                    <button onclick="calculateDist()">Calculate</button>
                    <p id="dist-result" style="margin-top:5px; font-weight:bold;">--- meters</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function filterMap(cat) {
            const status = document.getElementById('status-text');
            status.innerText = (cat === 'All') ? "Full Campus View" : "Viewing: " + cat;
        }

        function calculateDist() {
            let num = Math.floor(Math.random() * 800) + 10; 
            document.getElementById('dist-result').innerText = num + " meters";
        }
    </script>
</body>
</html>
