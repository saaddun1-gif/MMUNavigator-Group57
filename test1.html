<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Navigator - Smart Sidebar</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body, html { height: 100%; width: 100%; overflow: hidden; }

        /* 1. THE SIDEBAR (Hidden by default) */
        .sidebar {
            position: fixed;
            top: 0;
            left: -150px; /* Moves it off-screen to the left */
            width: 140px; 
            height: 100%;
            background-color: white;
            border-right: 2px solid black;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 15px;
            z-index: 2000; /* Higher than map and other buttons */
            transition: 0.4s; /* Smooth sliding animation */
        }

        /* The class we add to show the sidebar */
        .sidebar.active {
            left: 0;
        }

        /* 2. OVERLAY BUTTONS */
        .menu-toggle-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1500;
            width: 100px;
            height: 100px;
            background: white;
            border: 2px solid black;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .search-container {
            position: absolute;
            top: 20px;
            left: 140px; /* Placed next to the Menu button */
            z-index: 1000;
        }

        .search-bar {
            width: 300px; padding: 12px 25px; border: 2px solid black;
            border-radius: 30px; font-size: 16px; background: white;
        }

        /* 3. BUTTON STYLES (Inside Sidebar) */
        .nav-btn {
            width: 100px; height: 100px; border: 2px solid black;
            background-color: white; display: flex; justify-content: center;
            align-items: center; cursor: pointer; border-radius: 12px;
        }

        .icon-img { width: 60%; height: 60%; object-fit: contain; }

        .filter-section {
            display: flex; flex-direction: column; gap: 8px; align-items: center;
        }

        .filter-btn {
            width: 100px; padding: 8px 0; font-size: 11px; font-weight: bold;
            cursor: pointer; border: 1px solid black; background: white; border-radius: 5px;
        }

        /* 4. MAP AREA */
        #map { width: 100%; height: 100%; z-index: 1; }

        .distance-tool {
            position: absolute; bottom: 20px; right: 20px;
            background: white; border: 2px solid black;
            padding: 15px; border-radius: 8px; z-index: 1000;
        }
    </style>
</head>
<body>

    <button class="menu-toggle-btn" onclick="toggleSidebar()">
        <img src="https://via.placeholder.com/60?text=Menu" class="icon-img">
    </button>

    <div class="sidebar" id="mySidebar">
        <button class="nav-btn" onclick="toggleSidebar()" style="background: #f0f0f0;">
            <img src="https://via.placeholder.com/60?text=X" class="icon-img">
        </button>

        <button class="nav-btn"><img src="https://via.placeholder.com/60?text=Chat" class="icon-img"></button>
        <button class="nav-btn"><img src="https://via.placeholder.com/60?text=Home" class="icon-img"></button>
        
        <div class="filter-section">
            <span style="font-size: 10px; font-weight: bold;">FILTERS</span>
            <button class="filter-btn" onclick="filterMap('Faculty')">FACULTY</button>
            <button class="filter-btn" onclick="filterMap('Cafe')">CAFE</button>
            <button class="filter-btn" onclick="filterMap('Library')">LIBRARY</button>
        </div>

        <div style="margin-top: auto;">
            <button class="nav-btn" style="border-radius: 50%;"><img src="https://via.placeholder.com/100?text=Admin" style="width:100%; height:100%; border-radius:50%;"></button>
        </div>
    </div>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Search MMU locations...">
    </div>
    
    <div id="map"></div>
    
    <div class="distance-tool">
        <strong>Distance Tool</strong><br>
        <button onclick="calculateDist()" style="margin-top:5px; cursor:pointer;">Calculate</button>
        <p id="dist-result" style="margin-top:5px; font-weight:bold;">--- meters</p>
    </div>

    <script>
        // SIDEBAR TOGGLE LOGIC
        function toggleSidebar() {
            var sidebar = document.getElementById("mySidebar");
            // This adds or removes the "active" class
            sidebar.classList.toggle("active");
        }

        // INITIALIZE MAP
        var map = L.map('map').setView([2.9276, 101.6418], 17);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // FILTER AND DISTANCE LOGIC
        function filterMap(cat) {
            alert("Filtering map for: " + cat);
            toggleSidebar(); // Close sidebar after selecting a filter
        }

        function calculateDist() {
            let num = Math.floor(Math.random() * 500) + 50; 
            document.getElementById('dist-result').innerText = num + " meters";
        }
    </script>
</body>
</html>
