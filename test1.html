<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Navigator - Smart Sidebar</title>
    
    <link rel="stylesheet" href="test1.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <button class="menu-toggle-btn" onclick="toggleSidebar()">
        <img src="menu.png" class="icon-img">
    </button>

    <div class="sidebar" id="mySidebar">
        <button class="nav-btn" onclick="toggleSidebar()" style="background: #f0f0f0;">
            <img src="menu.png" class="icon-img">
        </button>

        <button class="nav-btn"><img src="chatbox.png" class="icon-img"></button>
        <button class="nav-btn"><img src="home.png" class="icon-img"></button>

        <div style="margin-top: auto;">
            <button class="nav-btn" style="border-radius: 50%;"><img src="https://via.placeholder.com/100?text=Admin" style="width:100%; height:100%; border-radius:50%;"></button>
        </div>
    </div>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Search MMU locations...">
    </div>
    
    <div id="map"></div>
    
    <div class="distance-tool">
        <strong>Distance Tool</strong><br>
        <button onclick="calculateDist()" style="margin-top:5px; cursor:pointer;">Calculate</button>
        <p id="dist-result" style="margin-top:5px; font-weight:bold;">--- meters</p>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById("mySidebar").classList.toggle("active");
        }

        var map = L.map('map', {
            zoomControl: false,
            rotate: true,
            touchRotate: true,
            bearing: 90,
        }).setView([2.9276, 101.6418], 18);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 20,
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        function calculateDist() {
            let num = Math.floor(Math.random() * 500) + 50; 
            document.getElementById('dist-result').innerText = num + " meters";
        }
    </script>
</body>
</html>
