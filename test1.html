<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Navigator</title>
    
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <div class="sidebar">
        <button class="nav-btn"><img src="https://via.placeholder.com/60?text=Menu" class="icon-img"></button>
        <button class="nav-btn"><img src="https://via.placeholder.com/60?text=Chat" class="icon-img"></button>
        
        <button class="nav-btn" onclick="toggleHomeMenu()">
            <img src="https://via.placeholder.com/60?text=Home" class="icon-img">
        </button>

        <button class="nav-btn"><img src="https://via.placeholder.com/60?text=+" class="icon-img"></button>

        <div style="margin-top: auto; margin-bottom: 20px;">
            <button class="nav-btn" style="border-radius: 50%; width: 80px; height: 80px;">
                <img src="https://via.placeholder.com/80?text=Admin" style="width:100%; height:100%; border-radius:50%;">
            </button>
        </div>
    </div>

    <div class="sub-sidebar" id="homeSidebar">
        <h1 style="margin-bottom: 20px;">Delete</h1> 
        <button class="category-btn">Facility</button>
        <button class="category-btn">Faculty</button>
        <button class="category-btn">Hall</button>
    </div>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Search bar">
    </div>
    
    <div id="map"></div>

    <script>
        function toggleHomeMenu() {
            var homeMenu = document.getElementById("homeSidebar");
            homeMenu.classList.toggle("active");
        }

        var map = L.map('map', { zoomControl: false }).setView([2.9276, 101.6418], 17);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    </script>

</body>
</html>
