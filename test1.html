<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Navigator - Full Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body, html { height: 100%; width: 100%; overflow: hidden; }
        .container { width: 100vw; height: 100vh; display: flex; }

        /* SIDEBAR STYLE */
        .sidebar {
            width: 140px; 
            border-right: 2px solid black;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 15px;
            background-color: white;
            z-index: 1000; /* Keeps sidebar above the map */
        }

        .nav-btn {
            width: 100px; height: 100px; border: 2px solid black;
            background-color: white; display: flex; justify-content: center;
            align-items: center; cursor: pointer; border-radius: 12px;
        }

        .icon-img { width: 60%; height: 60%; object-fit: contain; }

        /* MAIN AREA */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }

        /* SEARCH BAR OVERLAY */
        .search-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000; /* Ensures it floats on top of the map */
        }

        .search-bar {
            width: 300px; padding: 12px 25px; border: 2px solid black;
            border-radius: 30px; font-size: 16px; background: white;
        }

        
        #map {
            width: 100%;
            height: 100%;
            background: #e0e0e0;
        }

        .distance-tool {
            position: absolute; bottom: 20px; right: 20px;
            background: white; border: 2px solid black;
            padding: 15px; border-radius: 8px; z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <button class="nav-btn"><img src="menu.png" class="icon-img"></button>
            <button class="nav-btn"><img src="chatbox.png" class="icon-img"></button>
            <button class="nav-btn"><img src="home.png" class="icon-img"></button>
            <div style="margin-top: auto;">
                <button class="nav-btn" style="border-radius: 50%;"><img src="https://via.placeholder.com/100?text=Admin" style="width:100%; height:100%; border-radius:50%;"></button>
            </div>
        </div>

        <div class="main">
            <div class="search-container">
                <input type="text" class="search-bar" placeholder="Search MMU locations...">
            </div>
            
            <div id="map"></div>
            
            <div class="distance-tool">
                <strong>Distance Tool</strong><br>
                <button onclick="calculateDist()" style="margin-top:5px; cursor:pointer;">Calculate</button>
                <p id="dist-result" style="margin-top:5px; font-weight:bold;">--- meters</p>
            </div>
        </div>
    </div>

    <script>
        
        // Coordinates for MMU Cyberjaya: [2.9276, 101.6418]
        var map = L.map('map').setView([2.9276, 101.6418], 17);

        // Load the "Tiles" (the actual drawing of the map)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Add a simple Marker for the center of MMU
        var mmuMarker = L.marker([2.9276, 101.6418]).addTo(map)
            .bindPopup('Welcome to MMU Cyberjaya!')
            .openPopup();

        
        function calculateDist() {
            let num = Math.floor(Math.random() * 500) + 50; 
            document.getElementById('dist-result').innerText = num + " meters";
        }
    </script>
</body>
</html>
